        linux-arm:
          url: https://github.com/packet-net/pdn-bpqchat/releases/download/v0.1.0/pdn-bpqchat_0.1.0_armhf.deb
          sha256: ba13b3673e69aab4619ded02bbb5931c771899a2859fbb332d5732b94fe2d55f

  - id: convers
