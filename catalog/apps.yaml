# pdn app catalog — the curated index of "Available apps" (docs/app-catalog.md).
#
# This file is committed here and baked into the node .deb at
# /usr/share/packetnet/catalog/apps.yaml. pdn reads it to populate the control
# panel's "Available apps" view; the owner installs an app from the browser and
# pdn fetches + sha256-verifies the artifact, staging a discovered-but-DISABLED
# package into /var/lib/packetnet/apps/<id>/ (enable stays the separate grant).
#
# TRUST: every artifact is pinned by sha256 (GitHub's recorded per-asset digest).
# A mismatched hash is a hard refusal — never a staged file. "Vetted" means we
# chose the version + the hash, exactly like the old build-deb.sh DAPPS pins.
#
# TO ADD/BUMP an app: set the release tag in each `url:`, take each asset's
# sha256 from `gh release view <tag> -R <repo> --json assets`, and update the
# `version:` to the release tag. (See docs/app-catalog.md § O3 for a future
# regen script.)

catalog: 1

apps:
  # kind: assets — a per-RID raw binary placed at `dest` + a separately-fetched
  # manifest. DAPPS publishes exactly this shape.
  - id: dapps
    name: DAPPS
    version: "0.34.1"
    description: "Distributed Asynchronous Packet Pub/Sub — store-and-forward messaging over packet radio."
    icon: inbox
    capabilities: [network, web]
    homepage: https://github.com/m0lte/dapps
    artifact:
      kind: assets
      manifest:
        url: https://github.com/m0lte/dapps/releases/download/v0.34.1/pdn-app.yaml
        sha256: ae0b2f50b7a7f7f38ba1ce6eb182cee21073cbd1646eca9a5189a9aa386d8125
      binaries:
        linux-x64:
          url: https://github.com/m0lte/dapps/releases/download/v0.34.1/dapps-linux-x64
          sha256: a509c31d0be87e2cf7f10b2fde0614234381b6fbc623580da9c9757a969ddb4b
          dest: dapps
          mode: "0755"
        linux-arm64:
          url: https://github.com/m0lte/dapps/releases/download/v0.34.1/dapps-linux-arm64
          sha256: 2205fed8ee4bf09cf5cfb24edbeb00017bbc6e68ca4611b9e4f055c570d4a76f
          dest: dapps
          mode: "0755"
        linux-arm:
