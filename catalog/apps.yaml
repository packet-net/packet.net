  # kind: deb — a per-arch .deb, EXTRACTED (dpkg-deb -x) not dpkg-installed; the
  # manifest + binary come from the .deb's usr/share/packetnet/apps/<id>/ subtree.
  # The Debian arch maps from the RID: linux-x64→amd64, linux-arm64→arm64, linux-arm→armhf.
  - id: bpqchat
    name: BPQ Chat
    version: "0.1.0"
    description: "BPQ-Chat-compatible chat node — RF + web chat, peering with the BPQ Chat network."
