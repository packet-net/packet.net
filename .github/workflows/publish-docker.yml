name: publish-docker

# Builds + pushes the multi-arch (amd64 + arm64) m0lte/packet.net node image.
# Triggered by a node-v* tag (alongside publish-node's .debs) or manually via
# workflow_dispatch (so the image can be (re)published for an existing version without
# cutting a release). Decoupled from publish-node so the .deb release never waits on it.
#
# Self-hosted x64 only (no GitHub-hosted runners — see CLAUDE.md). The arm64 image's
# RUN steps (apt-get) run under QEMU; the .NET app tree itself is cross-published by the
# SDK (PDN_FAST, no crossgen). Skips cleanly when the Docker Hub creds aren't set.

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag the image (e.g. 0.8.0)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      # build-deb.sh builds the web UI (npm ci + vite build) before publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: v
        name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/node-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build + push multi-arch image
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          VERSION: ${{ steps.v.outputs.version }}
        # Exclusive box-wide flock around the CPU-heavy publish, so it doesn't oversubscribe
        # a concurrent ci / publish-node build (§7.2.2).
        run: flock -x /tmp/pdn-ci-heavy.lock scripts/docker-image.sh "$VERSION" push

      - name: Skipped (no Docker Hub creds)
        if: ${{ env.DOCKERHUB_TOKEN == '' }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "::warning::DOCKERHUB_TOKEN not set — skipping the Docker image publish."
