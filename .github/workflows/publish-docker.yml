name: publish-docker

# Builds + pushes the multi-arch (amd64 + arm64) ghcr.io/packet-net/packet.net node image to GHCR.
# Triggered by a node-v* tag (alongside publish-node's .debs) or manually via
# workflow_dispatch (so the image can be (re)published for an existing version without
# cutting a release). Decoupled from publish-node so the .deb release never waits on it.
#
# Self-hosted x64 only (no GitHub-hosted runners — see CLAUDE.md). The arm64 image's
# RUN steps (apt-get) run under QEMU; the .NET app tree itself is cross-published by the
# SDK (PDN_FAST, no crossgen). Pushes to GHCR with the built-in GITHUB_TOKEN — no external creds.

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag the image (e.g. 0.8.0)'
        required: true

permissions:
  contents: read
  packages: write   # push the image to GHCR via the built-in GITHUB_TOKEN

jobs:
  publish:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      # build-deb.sh builds the web UI (npm ci + vite build) before publishing.
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - id: v
        name: Resolve version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/node-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push multi-arch image
        env:
          VERSION: ${{ steps.v.outputs.version }}
        # Exclusive box-wide flock around the CPU-heavy publish, so it doesn't oversubscribe
        # a concurrent ci / publish-node build (§7.2.2).
        run: flock -x /tmp/pdn-ci-heavy.lock scripts/docker-image.sh "$VERSION" push
