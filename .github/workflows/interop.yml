name: interop

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/Packet.Ax25/**'
      - 'src/Packet.Ax25.Sdl/**'
      - 'src/Packet.Kiss/**'
      - 'src/Packet.Axudp/**'
      - 'src/Packet.Rhp2/**'
      - 'src/Packet.Rhp2.Server/**'
      - 'src/Packet.Agw/**'
      - 'src/Packet.Node/**'
      - 'src/Packet.Node.Core/**'
      - 'src/Packet.NetRom/**'
      - 'tests/Packet.Interop.Tests/**'
      - 'docker/**'
      - 'scripts/interop-recreate-stack.sh'
      - '.github/workflows/interop.yml'
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # nightly full matrix at 02:17 UTC
    - cron: '17 2 * * *'

concurrency:
  # Workflow-level singleton. The docker stack at docker/compose.interop.yml
  # uses fixed container names (`pn-linbpq`, `pn-xrouter`, `pn-netsim`,
  # `pn-rax25`) and binds fixed host ports (8008, 8010, 8023, 8080, 8086,
  # 8093, 8095, 8100, 8101) — two concurrent runs collide on docker
  # resources and either fail to `compose up` ("rax25 is missing dependency
  # netsim") or fail mid-test with connection-refused / banner-missing
  # symptoms. Serialise instead. Cost is ~90 s of queue time per PR; gain
  # is interop reliability.
  group: interop
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JavaScript actions ahead of GitHub's
  # June 2nd, 2026 forced cutover. See ci.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  interop:
    name: interop matrix
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted runner.

      - name: build
        # Build once up front (no stack needed); every phase below runs
        # --no-build against this output.
        run: dotnet build --configuration Release

      # ────────────────────────────────────────────────────────────────────
      # The matrix is split into clean-stack-fenced phases. The stack is ONE
      # shared LinBPQ daemon + ONE net-sim half-duplex channel, so scenarios
      # contaminate each other through LinBPQ learned-state (NODES/routes/open
      # sessions) and channel contention. In particular the heavyweight NET/ROM
      # L3/L4 scenarios leave LinBPQ warm (learned routes + interlink sessions)
      # and the channel busy, which flakes the timing-sensitive AX.25 tests that
      # share net-sim port 8100. So we run each group against a FRESHLY
      # recreated stack and put the NET/ROM group LAST + isolated, where nothing
      # follows it. scripts/interop-recreate-stack.sh does the
      # down -v --remove-orphans + up --wait (the old pre-up/bring-up steps).
      # See docs/plan.md §7.2 for the contamination diagnosis + isolation design.
      # ────────────────────────────────────────────────────────────────────

      # ── Phase A: AX.25 + general interop (the timing-sensitive group) ──────
      # Runs FIRST on a pristine stack so no NET/ROM residue can precede it.
      # Excludes the NET/ROM scenarios (Group=NetRom) — they run isolated in
      # phase C.
      - name: recreate stack (phase A — AX.25 + general)
        run: scripts/interop-recreate-stack.sh
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: dump container state (phase A)
        if: failure()
        run: |
          docker compose -f docker/compose.interop.yml ps
          docker compose -f docker/compose.interop.yml logs --tail=200

      - name: interop tests (C#) — AX.25 + general (Group!=NetRom)
        run: dotnet test tests/Packet.Interop.Tests --configuration Release --no-build --filter "Category=Interop&Group!=NetRom"

      # ── Phase B: ax25-ts integration suite ────────────────────────────────
      # ax25-ts (m0lte/ax25-ts) ships its own integration suite against LinBPQ
      # via net-sim (tests/integration/**: the AX.25 linbpq-via-netsim round-trip
      # AND a NET/ROM NODES-ingest test). We clone main and run it against the
      # stack standing up in this job. It gets its OWN freshly recreated stack so
      # its internal NET/ROM-ingest can't contaminate the C# AX.25 timing tests
      # and vice versa. Pin to a SHA once the API stabilises; for now we track
      # main so spec changes flow end-to-end.
      - name: setup Node (for ax25-ts integration tests)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: clone m0lte/ax25-ts
        run: |
          rm -rf "${RUNNER_TEMP}/ax25-ts"
          git clone --depth=1 --branch main https://github.com/m0lte/ax25-ts.git "${RUNNER_TEMP}/ax25-ts"

      - name: recreate stack (phase B — ax25-ts)
        run: scripts/interop-recreate-stack.sh
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: dump container state (phase B)
        if: failure()
        run: |
          docker compose -f docker/compose.interop.yml ps
          docker compose -f docker/compose.interop.yml logs --tail=200

      - name: ax25-ts integration tests
        # `npm run test:integration` uses the integration vitest config,
        # which targets tests/integration/** and dials 127.0.0.1:8100
        # (the KISS-TCP listener the C# interop tests also use).
        run: |
          cd "${RUNNER_TEMP}/ax25-ts"
          npm ci
          npm run build
          npm run test:integration

      # ── Phase C: NET/ROM L3/L4 scenarios (isolated, LAST) ─────────────────
      # The heavyweight group (NODES origination + bidirectional L4 circuits +
      # provoked BPQ NODES). Run against a fresh stack and LAST, so the LinBPQ
      # learned-state + channel traffic it generates can never reach a
      # timing-sensitive AX.25 test. Each scenario also tears down its own state
      # (NetRomService.DisposeAsync DISCs its interlinks), so it leaves the stack
      # clean even within the group.
      - name: recreate stack (phase C — NET/ROM)
        run: scripts/interop-recreate-stack.sh
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: dump container state (phase C)
        if: failure()
        run: |
          docker compose -f docker/compose.interop.yml ps
          docker compose -f docker/compose.interop.yml logs --tail=200

      - name: interop tests (C#) — NET/ROM (Group=NetRom)
        run: dotnet test tests/Packet.Interop.Tests --configuration Release --no-build --filter "Category=Interop&Group=NetRom"

      - name: tear down
        # Best-effort teardown that runs even when a phase FAILED or the job was
        # cancelled (the recreate-before-each step is the BACKSTOP for a hard-killed
        # run that skips this). `--remove-orphans` matches the recreate script so this
        # last line of defence is exactly as thorough as the first: a service renamed
        # or removed from the compose file can't leave an orphaned `pn-*` container
        # behind even for one cycle. `|| true` so a teardown hiccup (e.g. nothing to
        # remove) can't turn a green run red.
        if: always()
        run: docker compose -f docker/compose.interop.yml down -v --remove-orphans || true
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop
