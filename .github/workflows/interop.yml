name: interop

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/Packet.Ax25/**'
      - 'src/Packet.Ax25.Sdl/**'
      - 'src/Packet.Kiss/**'
      - 'src/Packet.Axudp/**'
      - 'src/Packet.Rhp2/**'
      - 'src/Packet.Rhp2.Server/**'
      - 'src/Packet.Agw/**'
      - 'src/Packet.Node/**'
      - 'tests/Packet.Interop.Tests/**'
      - 'web/ax25-ts/**'
      - 'ts-spec/**'
      - 'docker/**'
      - '.github/workflows/interop.yml'
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # nightly full matrix at 02:17 UTC
    - cron: '17 2 * * *'

concurrency:
  group: interop-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JavaScript actions ahead of GitHub's
  # June 2nd, 2026 forced cutover. See ci.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  interop:
    name: interop matrix
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted runner.

      - name: pre-up cleanup
        # The self-hosted docker daemon's state can leak between runs —
        # a crashed previous run can leave the named volume pointing at
        # a container ID that no longer exists, which then makes
        # `compose up` fail with "No such container" on the next run.
        # Forcing a clean slate before each invocation prevents that.
        # `|| true` because there may be nothing to clean up on a fresh
        # runner, and that's not an error.
        run: docker compose -f docker/compose.interop.yml down -v --remove-orphans || true
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: bring up interop stack
        run: docker compose -f docker/compose.interop.yml up -d --wait
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: dump container state
        if: failure()
        run: |
          docker compose -f docker/compose.interop.yml ps
          docker compose -f docker/compose.interop.yml logs --tail=200

      - name: build
        run: dotnet build --configuration Release

      - name: interop tests (C#)
        run: dotnet test tests/Packet.Interop.Tests --configuration Release --no-build --filter "Category=Interop"

      # ax25.ts ships its own integration test against LinBPQ via net-sim
      # (`tests/integration/linbpq-via-netsim.test.ts`). It dials the same
      # 127.0.0.1:8100 KISS-TCP listener the C# tests use; the describe
      # block self-skips if the listener is unreachable, but we're inside
      # the interop job so it should always be up by the time this step
      # runs. Build ts-spec first (web/ax25-ts depends on it via `file:`).
      - name: setup Node (for ax25.ts integration tests)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            ts-spec/package-lock.json
            web/ax25-ts/package-lock.json

      - name: build ts-spec
        run: |
          cd ts-spec
          npm ci
          npm run build

      - name: ax25.ts integration tests
        # `npm test` runs unit tests only (excludes tests/integration/).
        # `npm run test:integration` uses the integration vitest config,
        # which includes only tests/integration/**.
        run: |
          cd web/ax25-ts
          npm ci
          npm run build
          npm run test:integration

      - name: tear down
        if: always()
        run: docker compose -f docker/compose.interop.yml down -v
