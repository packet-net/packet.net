name: interop

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/Packet.Ax25/**'
      - 'src/Packet.Ax25.Sdl/**'
      - 'src/Packet.Kiss/**'
      - 'src/Packet.Axudp/**'
      - 'src/Packet.Rhp2/**'
      - 'src/Packet.Rhp2.Server/**'
      - 'src/Packet.Agw/**'
      - 'src/Packet.Node/**'
      - 'src/Packet.Node.Core/**'
      - 'src/Packet.NetRom/**'
      - 'tests/Packet.Interop.Tests/**'
      - 'docker/**'
      - '.github/workflows/interop.yml'
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # nightly full matrix at 02:17 UTC
    - cron: '17 2 * * *'

concurrency:
  # Workflow-level singleton. The docker stack at docker/compose.interop.yml
  # uses fixed container names (`pn-linbpq`, `pn-xrouter`, `pn-netsim`,
  # `pn-rax25`) and binds fixed host ports (8008, 8010, 8023, 8080, 8086,
  # 8093, 8095, 8100, 8101) — two concurrent runs collide on docker
  # resources and either fail to `compose up` ("rax25 is missing dependency
  # netsim") or fail mid-test with connection-refused / banner-missing
  # symptoms. Serialise instead. Cost is ~90 s of queue time per PR; gain
  # is interop reliability.
  group: interop
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JavaScript actions ahead of GitHub's
  # June 2nd, 2026 forced cutover. See ci.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  interop:
    name: interop matrix
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted runner.

      - name: pre-up cleanup
        # The self-hosted docker daemon's state can leak between runs —
        # a crashed previous run can leave the named volume pointing at
        # a container ID that no longer exists, which then makes
        # `compose up` fail with "No such container" on the next run.
        # Forcing a clean slate before each invocation prevents that.
        # `|| true` because there may be nothing to clean up on a fresh
        # runner, and that's not an error.
        run: docker compose -f docker/compose.interop.yml down -v --remove-orphans || true
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: bring up interop stack
        run: docker compose -f docker/compose.interop.yml up -d --wait
        env:
          COMPOSE_PROJECT_NAME: packetnet-interop

      - name: dump container state
        if: failure()
        run: |
          docker compose -f docker/compose.interop.yml ps
          docker compose -f docker/compose.interop.yml logs --tail=200

      - name: build
        run: dotnet build --configuration Release

      - name: interop tests (C#)
        run: dotnet test tests/Packet.Interop.Tests --configuration Release --no-build --filter "Category=Interop"

      # ax25-ts ships its own integration test against LinBPQ via
      # net-sim (`tests/integration/linbpq-via-netsim.test.ts`). The
      # library itself lives at m0lte/ax25-ts; we clone main and run
      # its integration suite against the docker stack standing up
      # in this job. Pin to a SHA once the API stabilises; for now
      # we track main so spec changes flow end-to-end.
      - name: setup Node (for ax25-ts integration tests)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: clone m0lte/ax25-ts
        run: |
          rm -rf "${RUNNER_TEMP}/ax25-ts"
          git clone --depth=1 --branch main https://github.com/m0lte/ax25-ts.git "${RUNNER_TEMP}/ax25-ts"

      - name: ax25-ts integration tests
        # `npm run test:integration` uses the integration vitest config,
        # which targets tests/integration/** and dials 127.0.0.1:8100
        # (the KISS-TCP listener the C# interop tests also use).
        run: |
          cd "${RUNNER_TEMP}/ax25-ts"
          npm ci
          npm run build
          npm run test:integration

      - name: tear down
        if: always()
        run: docker compose -f docker/compose.interop.yml down -v
