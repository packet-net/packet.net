name: publish-node

# Builds the pdn node-host Debian packages (amd64 / arm64 / armhf) and attaches
# them to a GitHub Release. Triggered by `node-v*` tags — distinct from the
# `lib-v*` tag that drives the NuGet library publish (publish-libs.yml).
#
# Self-hosted x64 only (no GitHub-hosted runners — see CLAUDE.md). The arm builds
# cross-publish from x64 via crossgen2 (ReadyToRun), so no arch-native runners or
# cross C-toolchain are needed; scripts/build-deb.sh does the publish + packaging.

on:
  push:
    tags:
      - 'node-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without the node-v prefix, e.g. 0.1.0'
        required: true

permissions:
  contents: read

jobs:
  version:
    runs-on: [self-hosted, Linux, X64]
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/node-v}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      # Serial: crossgen2 (ReadyToRun) is memory-hungry and the self-hosted
      # runners share a host — three concurrent R2R cross-publishes OOM-kill
      # crossgen2 (exit 137, arm64 is the heaviest cross-target). One arch at a
      # time fits comfortably; the release is infrequent so the ~3x wall-time is fine.
      max-parallel: 1
      matrix:
        rid: [linux-x64, linux-arm64, linux-arm]
    steps:
      - uses: actions/checkout@v6
      - name: Build .deb (${{ matrix.rid }})
        run: scripts/build-deb.sh "${{ matrix.rid }}" "${{ needs.version.outputs.version }}"
      - uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.rid }}
          path: artifacts/packetnet_*.deb
          if-no-files-found: error
          # Transient build->release hand-off only: the release job downloads these
          # in the SAME run, and the published .debs then live on the GitHub Release.
          # Expire them fast so they don't pile up against the Actions artifact-
          # storage quota and block a future release's upload (observed 2026-06-05: a
          # node release build hit the ~500 MB free-tier quota, all of it stale
          # deb-* build artifacts from prior releases that are also on the Releases).
          retention-days: 1

  smoke:
    # Gate: a .deb that won't install cleanly must never reach the release.
    # Reuses the already-built amd64 artifact (no rebuild). Container-isolated,
    # so nothing is installed onto the self-hosted runner. amd64 only (native,
    # no QEMU); arm64/armhf are a later docker/setup-qemu matrix.
    needs: [version, build]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: deb-linux-x64
          path: artifacts
      - name: Install-smoke the amd64 .deb (Debian-stable + Ubuntu-LTS)
        run: scripts/deb-install-smoke.sh "artifacts/packetnet_${{ needs.version.outputs.version }}_amd64.deb"

  release:
    needs: [version, build, smoke]
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: debs
      - name: Collect + checksum
        run: |
          mkdir -p out
          find debs -name '*.deb' -exec cp {} out/ \;
          ( cd out && sha256sum *.deb > SHA256SUMS && ls -l )
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          gh release create "node-v${VERSION}" out/*.deb out/SHA256SUMS \
            --repo "${{ github.repository }}" \
            --title "pdn node-v${VERSION}" \
            --notes "Packet.NET node host (pdn) ${VERSION} — self-contained \`.deb\`s for amd64 / arm64 / armhf. Install on Debian/Ubuntu/RaspiOS: \`sudo apt install ./packetnet_${VERSION}_<arch>.deb\` (no .NET runtime required). The service runs as a hardened systemd unit; edit /etc/packetnet/packetnet.yaml to set your callsign + ports."
