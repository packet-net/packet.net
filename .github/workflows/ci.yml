name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runner — zero GitHub Actions minutes consumed.
    # Codebase targets netX.0 + portable APIs, so Linux catches ~95 %
    # of regressions. Cross-platform drift detection can ride a nightly
    # GitHub-hosted matrix later if it actually proves necessary.
    #
    # One matrix entry per test project. Each entry runs its own
    # `dotnet test <project>` which transitively builds the project's
    # dependencies — i.e. a compile error in a depended-on src/* lights
    # up every matrix entry that uses it, and a compile error in a
    # test project lights up just that entry. We get build coverage
    # plus parallelism for free.
    #
    # Parallelism cap: GitHub schedules as many matrix entries as the
    # self-hosted pool can take concurrently. With one runner this is
    # serial (and slower than the old single-job step thanks to
    # per-entry checkout overhead); the win lands when ≥2 runner
    # instances are registered on the box.
    strategy:
      fail-fast: false
      matrix:
        project:
          - Packet.Agw.Tests
          - Packet.Aprs.Tests
          - Packet.Ax25.Conformance.Tests
          - Packet.Ax25.Properties
          - Packet.Ax25.Tests
          - Packet.Axudp.Tests
          - Packet.Core.Tests
          - Packet.Interop.Tests
          - Packet.Kiss.NinoTnc.Tests
          - Packet.Kiss.Tests
          - Packet.Node.Tests
          - Packet.Rhp2.Tests
          - Packet.Sdl.CodeGen.Tests
    steps:
      - uses: actions/checkout@v4

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted
        # runner. We skip actions/setup-dotnet because it would try to
        # re-install per-job into a path the `gh` user can't write to.

      - name: test
        run: |
          dotnet test tests/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        # Only upload on failure to spare the account's artifact-storage
        # quota — green-run artifacts are noise. `continue-on-error` keeps
        # the job's overall outcome reflecting the test step, not whether
        # the upload itself succeeded.
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.project }}
          path: 'tests/${{ matrix.project }}/TestResults/*.trx'
          retention-days: 7

  sdl-codegen-discipline:
    name: SDL codegen idempotent
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted
        # runner. We skip actions/setup-dotnet because it would try to
        # re-install per-job into a path the `gh` user can't write to.

      - name: setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
        # Codegen emits Go alongside C# when go-spec/ax25sdl/ exists
        # (it does), and uses gofmt to canonicalise the output. Without
        # Go on PATH, emitted Go would drift from the committed copy and
        # the no-drift assert below would fail.

      - name: setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ts-spec/package-lock.json
        # Codegen emits TS alongside C#/Go when ts-spec/src/ax25sdl/
        # exists; we don't need npm at codegen time (the emitter is
        # pure C#), but we DO need Node for the typecheck + test steps
        # below.

      - name: run codegen
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --in spec-sdl --out src/Packet.Ax25.Sdl --tests tests/Packet.Ax25.Conformance.Tests
        continue-on-error: true # Phase 0: codegen exists but is still a stub

      - name: assert no drift
        run: |
          if ! git diff --exit-code -- src/Packet.Ax25.Sdl tests/Packet.Ax25.Conformance.Tests spec-sdl/'**/*.g.mmd' go-spec/ax25sdl ts-spec/src/ax25sdl; then
            echo "::error::SDL codegen produced uncommitted output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: go-spec build + vet + test + gofmt
        run: |
          cd go-spec
          go build ./...
          go vet ./...
          go test ./...
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::go-spec files are not gofmt-canonical:"
            echo "$unformatted"
            exit 1
          fi

      - name: ts-spec typecheck + test
        run: |
          cd ts-spec
          npm ci
          npm run typecheck
          npm test
