name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # GitHub will force JavaScript actions onto Node.js 24 from
  # June 2nd, 2026 and remove Node.js 20 from the runner on
  # September 16th, 2026. Opting in early both silences the
  # deprecation warning and lets us catch any Node 24 breakage
  # well ahead of the forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runners — zero GitHub Actions minutes consumed.
    strategy:
      fail-fast: false
      matrix:
        project:
          - Packet.Agw.Tests
          - Packet.Aprs.Tests
          - Packet.Ax25.Properties
          - Packet.Ax25.Tests
          - Packet.Axudp.Tests
          - Packet.Core.Tests
          - Packet.Interop.Tests
          - Packet.Kiss.NinoTnc.Tests
          - Packet.Kiss.Tests
          - Packet.Node.Tests
          - Packet.Rhp2.Tests
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: test
        run: |
          dotnet test tests/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}
          path: 'tests/${{ matrix.project }}/TestResults/*.trx'
          retention-days: 7
