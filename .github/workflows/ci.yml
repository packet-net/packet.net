name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # GitHub will force JavaScript actions onto Node.js 24 from
  # June 2nd, 2026 and remove Node.js 20 from the runner on
  # September 16th, 2026. Opting in early both silences the
  # deprecation warning and lets us catch any Node 24 breakage
  # well ahead of the forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runners — zero GitHub Actions minutes consumed.
    # With 4 runners registered on the 16-core box, the 13 matrix
    # entries land in 4 rounds (or so) instead of one long serial run.
    strategy:
      fail-fast: false
      matrix:
        project:
          - Packet.Agw.Tests
          - Packet.Aprs.Tests
          - Packet.Ax25.Conformance.Tests
          - Packet.Ax25.Properties
          - Packet.Ax25.Tests
          - Packet.Axudp.Tests
          - Packet.Core.Tests
          - Packet.Interop.Tests
          - Packet.Kiss.NinoTnc.Tests
          - Packet.Kiss.Tests
          - Packet.Node.Tests
          - Packet.Rhp2.Tests
          - Packet.Sdl.CodeGen.Tests
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted
        # runner. We skip actions/setup-dotnet because it would try to
        # re-install per-job into a path the `gh` user can't write to.

      - name: test
        run: |
          dotnet test tests/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        # Only upload on failure to spare the account's artifact-storage
        # quota — green-run artifacts are noise. `continue-on-error` keeps
        # the job's overall outcome reflecting the test step, not whether
        # the upload itself succeeded.
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}
          path: 'tests/${{ matrix.project }}/TestResults/*.trx'
          retention-days: 7

  # ─── SDL codegen discipline ────────────────────────────────────────
  #
  # Three parallel jobs, one per backend (C#, Go, TypeScript). Each runs
  # the codegen with the other backends suppressed (--no-go / --no-ts)
  # so the job only needs its own language toolchain — no .NET-only
  # job waits for npm install, no Go job waits for ts-spec typecheck.
  # The price is that the codegen runs 3× per CI invocation; the
  # generator is ~5 seconds so the wallclock saving easily wins.
  #
  # All three assert "no drift on the files in scope", proving the
  # checked-in generated output matches what the orchestrator would
  # produce right now. Plus the Go and TS jobs run their respective
  # build / test / format checks against the regenerated output.

  sdl-codegen-csharp:
    name: SDL codegen — C# drift
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: run codegen (C# only)
        # --csharp opts in to the C# backend with its default output paths.
        # No --go / --ts means only C# emits (opt-in-by-presence — see
        # Packet.Sdl.CodeGen/Program.cs for the CLI contract).
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --csharp
        continue-on-error: true # Phase 0: codegen exists but is still a stub

      - name: assert no drift
        run: |
          if ! git diff --exit-code -- src/Packet.Ax25.Sdl tests/Packet.Ax25.Conformance.Tests spec-sdl/'**/*.g.mmd'; then
            echo "::error::SDL codegen produced uncommitted C# output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

  sdl-codegen-go:
    name: SDL codegen — Go drift + build/vet/test/gofmt
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # No external Go dependencies in go-spec (no go.sum) so the
          # default cache step warns "Dependencies file is not found".
          # Disable cache rather than carry a useless warning.
          cache: false

      - name: run codegen (Go only)
        # --go opts in to the Go backend only. No --csharp / --ts means
        # the C# + TS backends are skipped — this job only needs .NET +
        # Go installed.
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --go
        continue-on-error: true

      - name: assert no drift in go-spec
        run: |
          if ! git diff --exit-code -- go-spec/ax25sdl; then
            echo "::error::SDL codegen produced uncommitted Go output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: go-spec build + vet + test + gofmt
        run: |
          cd go-spec
          go build ./...
          go vet ./...
          go test ./...
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::go-spec files are not gofmt-canonical:"
            echo "$unformatted"
            exit 1
          fi

  sdl-codegen-ts:
    name: SDL codegen — TS drift + typecheck/test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ts-spec/package-lock.json

      - name: run codegen (TS only)
        # --ts opts in to the TS backend only. No --csharp / --go means
        # the C# + Go backends are skipped — this job only needs .NET +
        # Node installed.
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --ts
        continue-on-error: true

      - name: assert no drift in ts-spec
        run: |
          if ! git diff --exit-code -- ts-spec/src/ax25sdl; then
            echo "::error::SDL codegen produced uncommitted TS output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: ts-spec typecheck + test
        run: |
          cd ts-spec
          npm ci
          npm run typecheck
          npm test
