name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # GitHub will force JavaScript actions onto Node.js 24 from
  # June 2nd, 2026 and remove Node.js 20 from the runner on
  # September 16th, 2026. Opting in early both silences the
  # deprecation warning and lets us catch any Node 24 breakage
  # well ahead of the forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runners — zero GitHub Actions minutes consumed.
    # With 4 runners registered on the 16-core box, the 13 matrix
    # entries land in 4 rounds (or so) instead of one long serial run.
    strategy:
      fail-fast: false
      matrix:
        project:
          - Packet.Agw.Tests
          - Packet.Aprs.Tests
          - Packet.Ax25.Conformance.Tests
          - Packet.Ax25.Properties
          - Packet.Ax25.Tests
          - Packet.Axudp.Tests
          - Packet.Core.Tests
          - Packet.Interop.Tests
          - Packet.Kiss.NinoTnc.Tests
          - Packet.Kiss.Tests
          - Packet.Node.Tests
          - Packet.Rhp2.Tests
          - Packet.Sdl.CodeGen.Tests
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted
        # runner. We skip actions/setup-dotnet because it would try to
        # re-install per-job into a path the `gh` user can't write to.

      - name: test
        run: |
          dotnet test tests/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        # Only upload on failure to spare the account's artifact-storage
        # quota — green-run artifacts are noise. `continue-on-error` keeps
        # the job's overall outcome reflecting the test step, not whether
        # the upload itself succeeded.
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}
          path: 'tests/${{ matrix.project }}/TestResults/*.trx'
          retention-days: 7

  # ─── SDL codegen discipline ────────────────────────────────────────
  #
  # Seven parallel jobs, one per backend (C#, Go, TypeScript, JSON,
  # Rust, C, Python). Each runs the codegen with `--<lang>` to opt
  # into only that backend (opt-in-by-presence — see
  # `Packet.Sdl.CodeGen/Program.cs` for the CLI contract) so the job
  # only needs its own language toolchain. The price is that the
  # codegen runs 7× per CI invocation; the generator is ~5 seconds so
  # the wallclock saving easily wins.
  #
  # All seven assert "no drift on the files in scope", proving the
  # checked-in generated output matches what the orchestrator would
  # produce right now. The backends with a runtime (Go, TS, Rust, C,
  # Python) additionally run their respective build / test / format
  # checks against the regenerated output. JSON validates structurally
  # at codegen time in C# against `json-spec/schema.json`, so its
  # discipline job is just the drift assert.

  sdl-codegen-csharp:
    name: SDL codegen — C# drift
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: run codegen (C# only)
        # --csharp opts in to the C# backend with its default output paths.
        # No --go / --ts means only C# emits (opt-in-by-presence — see
        # Packet.Sdl.CodeGen/Program.cs for the CLI contract).
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --csharp
        continue-on-error: true # Phase 0: codegen exists but is still a stub

      - name: assert no drift
        run: |
          if ! git diff --exit-code -- src/Packet.Ax25.Sdl tests/Packet.Ax25.Conformance.Tests spec-sdl/'**/*.g.mmd'; then
            echo "::error::SDL codegen produced uncommitted C# output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

  sdl-codegen-go:
    name: SDL codegen — Go drift + build/vet/test/gofmt
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          # No external Go dependencies in go-spec (no go.sum) so the
          # default cache step warns "Dependencies file is not found".
          # Disable cache rather than carry a useless warning.
          cache: false

      - name: run codegen (Go only)
        # --go opts in to the Go backend only. No --csharp / --ts means
        # the C# + TS backends are skipped — this job only needs .NET +
        # Go installed.
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --go
        continue-on-error: true

      - name: assert no drift in go-spec
        run: |
          if ! git diff --exit-code -- go-spec/ax25sdl; then
            echo "::error::SDL codegen produced uncommitted Go output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: go-spec build + vet + test + gofmt
        run: |
          cd go-spec
          go build ./...
          go vet ./...
          go test ./...
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::go-spec files are not gofmt-canonical:"
            echo "$unformatted"
            exit 1
          fi

  sdl-codegen-ts:
    name: SDL codegen — TS drift + typecheck/test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ts-spec/package-lock.json

      - name: run codegen (TS only)
        # --ts opts in to the TS backend only. No --csharp / --go means
        # the C# + Go backends are skipped — this job only needs .NET +
        # Node installed.
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --ts
        continue-on-error: true

      - name: assert no drift in ts-spec
        run: |
          if ! git diff --exit-code -- ts-spec/src/ax25sdl; then
            echo "::error::SDL codegen produced uncommitted TS output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: ts-spec typecheck + test
        run: |
          cd ts-spec
          npm ci
          npm run typecheck
          npm test

  sdl-codegen-json:
    name: SDL codegen — JSON drift + schema validation
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: run codegen (JSON only)
        # --json opts in to the JSON backend only. The C# emitter
        # validates every emission against json-spec/schema.json at
        # codegen time (JsonSchema.Net) before writing, so a failed
        # validation surfaces as a non-zero exit here, not as silent
        # drift downstream.
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --json
        continue-on-error: true

      - name: assert no drift in json-spec
        run: |
          if ! git diff --exit-code -- json-spec; then
            echo "::error::SDL codegen produced uncommitted JSON output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

  sdl-codegen-rust:
    name: SDL codegen — Rust drift + cargo build/test/fmt
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: run codegen (Rust only)
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --rust
        continue-on-error: true

      - name: assert no drift in rust-spec
        run: |
          if ! git diff --exit-code -- rust-spec; then
            echo "::error::SDL codegen produced uncommitted Rust output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: rust-spec check + fmt
        run: |
          cd rust-spec
          # `cargo check` does syntax + type checking without linking.
          # `cargo build/test` would need a C linker (`cc`) on the runner;
          # see the note in `rust-spec/README.md` about installing
          # `build-essential` if you want full verification locally.
          cargo check --quiet
          cargo fmt -- --check

      - name: rust-spec build + test (skipped if no C linker)
        run: |
          if which cc >/dev/null 2>&1; then
            cd rust-spec
            cargo build --quiet
            cargo test --quiet
          else
            echo "::warning::Skipping cargo build/test — the self-hosted runner has no C linker (cc not on PATH). cargo check + cargo fmt --check passed in the previous step."
          fi

  sdl-codegen-c:
    name: SDL codegen — C drift + cmake build/ctest/clang-format
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: probe C toolchain
        # The self-hosted `gh` user can't sudo non-interactively, so we
        # rely on whatever's installed on the runner. Required:
        # gcc + cmake (for build/ctest), clang-format (for format check).
        # Missing tools degrade the matching check from "verified" to
        # "skipped with a warning" — the drift assert always runs.
        id: probe
        run: |
          {
            echo "have_cc=$(which gcc >/dev/null 2>&1 && echo true || echo false)"
            echo "have_cmake=$(which cmake >/dev/null 2>&1 && echo true || echo false)"
            echo "have_clang_format=$(which clang-format >/dev/null 2>&1 && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: run codegen (C only)
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --emit-c
        continue-on-error: true

      - name: assert no drift in c-spec
        run: |
          if ! git diff --exit-code -- c-spec/src c-spec/test c-spec/include; then
            echo "::error::SDL codegen produced uncommitted C output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: c-spec build + ctest (skipped if no gcc/cmake)
        if: steps.probe.outputs.have_cc == 'true' && steps.probe.outputs.have_cmake == 'true'
        run: |
          cd c-spec
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release > /tmp/cmake.log 2>&1 || (cat /tmp/cmake.log && exit 1)
          make
          ctest --output-on-failure

      - name: c-spec clang-format check (skipped if clang-format missing)
        if: steps.probe.outputs.have_clang_format == 'true'
        run: |
          cd c-spec
          find src test -name "*.c" -o -name "*.h" | xargs clang-format --dry-run --Werror

      - name: warn on missing C tooling
        if: steps.probe.outputs.have_cc != 'true' || steps.probe.outputs.have_cmake != 'true' || steps.probe.outputs.have_clang_format != 'true'
        run: |
          echo "::warning::Self-hosted runner missing C toolchain — install build-essential + cmake + clang-format to enable full verification. cc=${{ steps.probe.outputs.have_cc }} cmake=${{ steps.probe.outputs.have_cmake }} clang-format=${{ steps.probe.outputs.have_clang_format }}"

  sdl-codegen-python:
    name: SDL codegen — Python drift + pytest/ruff
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: probe Python
        # We need both `python3` and an importable `venv` module. The
        # system Python on Ubuntu 26.04 ships python3 but `venv` is in
        # a separate apt package (`python3.14-venv`) — without it,
        # `python3 -m venv` fails with "ensurepip is not available".
        # The `gh` user can't `sudo apt install` non-interactively, so
        # missing venv means we degrade to a drift-only check rather
        # than reach for --break-system-packages.
        id: probe
        run: |
          have_python=false
          have_venv=false
          if which python3 >/dev/null 2>&1; then
            have_python=true
            python3 --version
            if python3 -c "import venv" 2>/dev/null; then
              have_venv=true
            fi
          fi
          {
            echo "have_python=$have_python"
            echo "have_venv=$have_venv"
          } >> "$GITHUB_OUTPUT"

      - name: run codegen (Python only)
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --python
        continue-on-error: true

      - name: assert no drift in python-spec
        run: |
          if ! git diff --exit-code -- python-spec/ax25sdl python-spec/tests; then
            echo "::error::SDL codegen produced uncommitted Python output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi

      - name: python-spec install + pytest
        if: steps.probe.outputs.have_python == 'true' && steps.probe.outputs.have_venv == 'true'
        run: |
          cd python-spec
          # Standard venv-isolated install — proper environment hygiene.
          # Requires python3-venv apt package on the runner (e.g.
          # `apt install python3.14-venv`).
          python3 -m venv .ci-venv
          .ci-venv/bin/pip install --upgrade --quiet pip pytest
          .ci-venv/bin/pip install --quiet -e .
          .ci-venv/bin/pytest -q

      - name: warn on missing Python tooling
        if: steps.probe.outputs.have_python != 'true' || steps.probe.outputs.have_venv != 'true'
        run: |
          echo "::warning::Self-hosted runner missing Python tooling (python3=${{ steps.probe.outputs.have_python }} venv=${{ steps.probe.outputs.have_venv }}). pytest skipped. Install python3 + python3.14-venv to enable pytest verification."
