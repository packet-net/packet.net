name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # GitHub will force JavaScript actions onto Node.js 24 from
  # June 2nd, 2026 and remove Node.js 20 from the runner on
  # September 16th, 2026. Opting in early both silences the
  # deprecation warning and lets us catch any Node 24 breakage
  # well ahead of the forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runners — zero GitHub Actions minutes consumed.
    strategy:
      fail-fast: false
      # All matrix jobs land on the SAME self-hosted runner, and GitHub runs them
      # in parallel by default. Twelve `dotnet test` processes co-resident
      # oversubscribed the box: the CPU-heavy FsCheck property suites
      # (Packet.Ax25.Properties / Packet.Ax25.Tests) saturated every core and
      # scheduling-starved the real-time AX.25 pumps in Packet.Node.Tests, blowing
      # their (bounded) connect/wait budgets — the intermittent ~66 s node-test
      # timeout (#47). Cap concurrency so the runner is never oversubscribed; the
      # node tests always have responsive CPU. (Same shared-runner-contention
      # remedy as the publish-node matrix's `max-parallel: 1` in #297, but the test
      # jobs are light enough that 4-at-a-time keeps throughput.)
      max-parallel: 4
      matrix:
        project:
          - Packet.Agw.Tests
          - Packet.Aprs.Tests
          - Packet.Ax25.Properties
          - Packet.Ax25.Tests
          - Packet.Axudp.Tests
          - Packet.Core.Tests
          - Packet.Interop.Tests
          - Packet.Kiss.NinoTnc.Tests
          - Packet.Kiss.Serial.Tests
          - Packet.Kiss.Tests
          - Packet.NetRom.Tests
          - Packet.Node.Tests
          - Packet.Rhp2.Tests
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: test
        # Shared (reader) box-wide flock. These matrix legs run 4-up among
        # themselves (multiple shared holders coexist) but never overlap a
        # CPU-heavy EXCLUSIVE workflow — interop / fuzz / deb-smoke — on the shared
        # self-hosted host. That overlap oversubscribes the physical CPU and
        # starves the integration suites' real-time AX.25 pumps/timers (the
        # Packet.Node.Tests flake). Command-wrapped, so the lock releases when the
        # test process exits (no holder to leak); it harmlessly no-ops if the
        # runners don't actually share /tmp. See docs/plan.md §7.2.2.
        run: |
          flock -s /tmp/pdn-ci-heavy.lock \
          dotnet test tests/${{ matrix.project }}/${{ matrix.project }}.csproj \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.project }}
          path: 'tests/${{ matrix.project }}/TestResults/*.trx'
          # Short retention: these only upload on failure and are for immediate
          # triage; long retention just accumulates against the ~500 MB Actions
          # artifact quota (the same one that bit publish-node — see its header).
          retention-days: 1

  web-ui:
    name: web-ui
    runs-on: [self-hosted, Linux, X64]
    # The Phase-5 node control-panel SPA (web/packetnet-ui): type-check + production
    # build + the screen smoke tests — the gate that keeps the served UI from
    # regressing. Self-hosted Linux runner, zero GitHub Actions minutes.
    defaults:
      run:
        working-directory: web/packetnet-ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: report node
        run: node --version && npm --version

      - name: install
        run: npm ci

      - name: typecheck + build + test
        # `npm run build` is `tsc --noEmit && vite build`; then the vitest screen
        # smoke suite. Shared (reader) box-wide flock, same discipline as the .NET
        # test job: coexist with other readers, never overlap a CPU-heavy EXCLUSIVE
        # workflow (interop / fuzz / deb-smoke) on the shared self-hosted host.
        run: flock -s /tmp/pdn-ci-heavy.lock bash -c 'npm run build && npm run test'

  dependency-scan:
    name: dependency-scan
    runs-on: [self-hosted, Linux, X64]
    # Fails the build if any referenced NuGet package (direct OR transitive) has a
    # known advisory in the configured sources — the supply-chain tripwire. Cheap
    # (`dotnet list package --vulnerable` is a restore + a metadata query), self-
    # hosted, zero GitHub Actions minutes. If a flagged transitive dep ever has no
    # fixable upgrade, pin the override in Directory.Packages.props (CPM) or relax
    # this gate deliberately — don't let it rot into an ignored red.
    steps:
      - uses: actions/checkout@v6

      - name: report .NET
        run: dotnet --version

      - name: vulnerable-package scan
        # `dotnet list package --vulnerable` always exits 0, so detect findings by
        # the table's row marker (lines like "   > Package  1.0  1.0  High  url").
        # Shared (reader) flock — a restore + metadata query is light, but keep the
        # box-wide discipline so it never overlaps an EXCLUSIVE heavy workflow.
        run: |
          flock -s /tmp/pdn-ci-heavy.lock bash -c '
            dotnet restore Packet.NET.slnx
            dotnet list Packet.NET.slnx package --vulnerable --include-transitive 2>&1 | tee vuln.txt
            if grep -E "^[[:space:]]*>[[:space:]]" vuln.txt; then
              echo "::error::Vulnerable NuGet packages detected (see the scan output above)."
              exit 1
            fi
            echo "No vulnerable packages."
          '

      - name: upload scan output
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: dependency-scan-output
          path: vuln.txt
          retention-days: 7
