name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-test:
    name: build & test
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted Linux runner — zero GitHub Actions minutes consumed.
    # Codebase targets netX.0 + portable APIs, so Linux catches ~95 %
    # of regressions. Cross-platform drift detection can ride a nightly
    # GitHub-hosted matrix later if it actually proves necessary.
    steps:
      - uses: actions/checkout@v4

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted
        # runner. We skip actions/setup-dotnet because it would try to
        # re-install per-job into a path the `gh` user can't write to.

      - name: restore
        run: dotnet restore

      - name: build
        run: dotnet build --configuration Release --no-restore

      - name: test
        run: dotnet test --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --filter "Category!=HardwareLoop&Category!=Interop"

      - name: upload test results
        # Only upload on failure to spare the account's artifact-storage
        # quota — green-run artifacts are noise. `continue-on-error` keeps
        # the job's overall outcome reflecting the test step, not whether
        # the upload itself succeeded.
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          retention-days: 7

  sdl-codegen-discipline:
    name: SDL codegen idempotent
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: report .NET
        run: dotnet --version
        # .NET 10 SDK is pre-installed system-wide on the self-hosted
        # runner. We skip actions/setup-dotnet because it would try to
        # re-install per-job into a path the `gh` user can't write to.

      - name: run codegen
        run: dotnet run --project tools/Packet.Sdl.CodeGen --configuration Release -- --in spec-sdl --out src/Packet.Ax25.Sdl --tests tests/Packet.Ax25.Conformance.Tests
        continue-on-error: true # Phase 0: codegen exists but is still a stub

      - name: assert no drift
        run: |
          if ! git diff --exit-code -- src/Packet.Ax25.Sdl tests/Packet.Ax25.Conformance.Tests spec-sdl/'**/*.g.mmd'; then
            echo "::error::SDL codegen produced uncommitted output. Run the codegen tool locally and commit the regenerated files."
            exit 1
          fi
