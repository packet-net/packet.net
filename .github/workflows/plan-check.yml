name: plan-check

# main-only by design (2026-07-14, see ci.yml): runs on each push to main and diffs the
# pushed range instead of a PR. Post-merge it's a red flag rather than a merge gate —
# which matches the working pattern (merge on green local tests) — and the override
# channel is commit messages only (a merge commit doesn't carry the PR body).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt into Node.js 24 for JavaScript actions ahead of GitHub's
  # June 2nd, 2026 forced cutover. See ci.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Enforces docs/plan.md §18 — every PR that materially changes the project
# must update the living plan in the same PR.
#
# Override mechanism: include `[skip-plan]` or `[no-plan-update]` in any commit
# message or the PR description. Reach for this only when the change is
# genuinely plan-irrelevant (e.g., typo fix, test-only refactor).

jobs:
  plan-update:
    name: docs/plan.md update discipline
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: classify changed files
        id: changes
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # A forced push or branch creation has no usable `before`; nothing to diff.
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            echo "::notice::no usable base SHA for this push — skipping plan-check"
            {
              echo "plan_changed=true"
              echo "plan_relevant_changed=false"
              echo "plan_relevant_list<<EOF"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mapfile -t changed < <(git diff --name-only "$BASE_SHA..$HEAD_SHA")
          printf '%s\n' "${changed[@]}" > /tmp/changed.txt

          # "plan-relevant" — paths whose modification typically implies the
          # plan should be updated. tests/, docs/ (other than plan.md), and
          # repo-housekeeping files are intentionally NOT in this list.
          plan_relevant_re='^(src/|spec-sdl/|tools/|docker/|installers/|\.github/workflows/|Directory\.Build\.props$|Directory\.Packages\.props$|global\.json$|Packet\.NET\.slnx$)'
          plan_path='docs/plan.md'

          plan_changed=false
          plan_relevant_changed=false
          plan_relevant_list=""

          for f in "${changed[@]}"; do
            if [[ "$f" == "$plan_path" ]]; then
              plan_changed=true
              continue
            fi
            if [[ "$f" =~ $plan_relevant_re ]]; then
              plan_relevant_changed=true
              plan_relevant_list+="  $f"$'\n'
            fi
          done

          {
            echo "plan_changed=$plan_changed"
            echo "plan_relevant_changed=$plan_relevant_changed"
            echo "plan_relevant_list<<EOF"
            echo -n "$plan_relevant_list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: check override markers (commit messages)
        id: override
        if: steps.changes.outputs.plan_relevant_changed == 'true' && steps.changes.outputs.plan_changed == 'false'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          combined=$(git log --format=%B "$BASE_SHA..$HEAD_SHA")
          if echo "$combined" | grep -qE '\[(skip-plan|no-plan-update)\]'; then
            echo "override=true" >> "$GITHUB_OUTPUT"
            echo "::notice::plan-check override honoured ([skip-plan] / [no-plan-update] found)"
          else
            echo "override=false" >> "$GITHUB_OUTPUT"
          fi

      - name: fail if plan not updated
        if: |
          steps.changes.outputs.plan_relevant_changed == 'true' &&
          steps.changes.outputs.plan_changed == 'false' &&
          steps.override.outputs.override != 'true'
        run: |
          cat <<'EOF'
          ::error::This push changes plan-relevant files but does not update docs/plan.md.

          Plan-relevant files changed in this push:
          EOF
          echo "${{ steps.changes.outputs.plan_relevant_list }}"
          cat <<'EOF'

          docs/plan.md §18 requires that changes to project direction,
          scope, locked decisions, working agreements, dependencies, or that
          complete a phase exit criterion, update docs/plan.md in the same
          change — including a §17 amendment-log entry.

          Two ways forward:

            1) Follow up with a docs/plan.md update (a §17 entry) — this
               check runs post-merge, so it flags rather than blocks.

            2) If this change is genuinely plan-irrelevant (typo fix,
               test-only refactor with no behavioural change, etc.), include
               '[skip-plan]' or '[no-plan-update]' in a commit message.
          EOF
          exit 1

      - name: report
        if: always()
        run: |
          echo "plan_changed=${{ steps.changes.outputs.plan_changed }}"
          echo "plan_relevant_changed=${{ steps.changes.outputs.plan_relevant_changed }}"
          echo "override=${{ steps.override.outputs.override }}"
