name: deb-smoke

# Shift-left install smoke: build an amd64 .deb and prove it installs cleanly on
# a pristine Debian-stable + Ubuntu-LTS, on every PR that touches packaging. This
# catches a broken control file / maintainer script / layout BEFORE you cut a
# `node-v*` tag (publish-node.yml also gates the release with the same script, but
# that fails only after the tag is pushed). amd64 only — native on the x64 runner,
# no QEMU; that's the "at least one .deb installs cleanly" guarantee.

on:
  pull_request:
    paths:
      - 'scripts/build-deb.sh'
      - 'scripts/deb-install-smoke.sh'
      - 'scripts/selfupdate-smoke.sh'
      - 'scripts/install-smoke.sh'
      - 'scripts/build-selfcontained-support.sh'
      - 'packaging/**'
      - '.github/workflows/deb-smoke.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Build amd64 .deb (throwaway version)
        # Exclusive box-wide flock around the CPU-heavy self-contained/crossgen
        # publish, so it doesn't oversubscribe a concurrent `ci` (§7.2.2).
        run: flock -x /tmp/pdn-ci-heavy.lock scripts/build-deb.sh linux-x64 0.0.0-ci
      - name: Install-smoke it (Debian-stable + Ubuntu-LTS)
        run: scripts/deb-install-smoke.sh artifacts/packetnet_0.0.0-ci_amd64.deb
      - name: Self-contained update helper smoke (download/verify/flip/rollback)
        # Exercises packaging/packetnet-selfupdate against a file:// fixture — no network,
        # no systemd. The self-contained channel's helper isn't in the .deb (apt channel),
        # so this is its CI coverage.
        run: scripts/selfupdate-smoke.sh
      - name: Self-contained installer smoke (install.sh end-to-end)
        # Exercises packaging/install.sh against a file:// feed (support bundle + fake app
        # payload + latest.json) with systemd/user-creation stubbed — the layout flip,
        # support-file placement, feed config, and sha256 refusal. No network, no root.
        run: scripts/install-smoke.sh
