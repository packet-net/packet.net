name: npm-publish

# Publishes `ax25sdl` (from ts-spec/) and `@packet-net/ax25` (from
# web/ax25/) to npmjs.com on any tag matching `v*`. See
# `docs/web-ax25/publishing.md` for the human-readable runbook
# this workflow implements.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    # Manual trigger for re-running a publish after fixing a transient
    # registry error. The tag itself is what determines the version
    # published — workflow_dispatch from a branch is intended for
    # validating the workflow shape without actually publishing
    # (NPM_TOKEN will be unset in the right shape).

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # Match the rest of the repo's pre-emptive Node 24 opt-in for
  # JavaScript actions. See ci.yml for context.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: publish to npmjs.com
    runs-on: [self-hosted, Linux, X64]
    # Self-hosted matches the rest of the repo: GitHub-hosted Actions
    # minutes aren't budgeted for this project. The publish path uses
    # only Node + npm + the npmjs registry — nothing self-hosted-only.
    env:
      # Job-level env so the `if: env.NPM_TOKEN != ''` checks on the
      # publish steps see the secret's resolved value (step-level env is
      # not visible in that step's own `if:`).
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'

      # ─── Build and publish ax25sdl first ────────────────────────────
      #
      # The order matters: ax25sdl must be on the registry before
      # @packet-net/ax25 can install it by version (`^0.1.0` in the
      # consumer's package.json). If you flip these, the second publish
      # fails with ERESOLVE.

      - name: ts-spec — install + build
        working-directory: ts-spec
        run: |
          npm ci
          npm run build

      - name: ts-spec — pack (dry-run sanity check)
        working-directory: ts-spec
        run: npm pack --dry-run

      - name: ts-spec — publish
        if: env.NPM_TOKEN != ''
        working-directory: ts-spec
        env:
          # `setup-node` with `registry-url` arranges for npm to read
          # NODE_AUTH_TOKEN out of the per-job `~/.npmrc` it wrote.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      # ─── Flip the file: dep to a registry version ───────────────────
      #
      # web/ax25/package.json on `main` declares its ax25sdl dep as
      # `file:../../ts-spec` so monorepo dev works without ceremony.
      # npm refuses to publish packages with file: deps; we flip the
      # reference to a registry version range here, inside the CI
      # shell only — the change is never committed back.

      - name: "web/ax25 — flip ax25sdl dep from file: to registry"
        working-directory: web/ax25
        run: |
          ts_spec_version=$(node -p "require('../../ts-spec/package.json').version")
          echo "Pinning web/ax25 → ax25sdl@^${ts_spec_version}"
          npm pkg set "dependencies.ax25sdl=^${ts_spec_version}"

      - name: web/ax25 — install + build
        working-directory: web/ax25
        # `npm install` (not `npm ci`) because we've just mutated
        # package.json above — the existing lockfile is now stale and
        # `npm ci` would refuse. The install regenerates the lockfile
        # against the registry.
        run: |
          npm install
          npm run build

      - name: web/ax25 — typecheck examples
        working-directory: web/ax25
        # Belt-and-braces: prove the examples typecheck against the
        # post-flip dependency graph before we publish.
        run: npm run typecheck:examples

      - name: web/ax25 — pack (dry-run sanity check)
        working-directory: web/ax25
        run: npm pack --dry-run

      - name: web/ax25 — publish
        if: env.NPM_TOKEN != ''
        working-directory: web/ax25
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: warn if NPM_TOKEN missing
        if: env.NPM_TOKEN == ''
        run: |
          echo "::warning::NPM_TOKEN secret is not set — publish steps were skipped. See docs/web-ax25/publishing.md for setup."
