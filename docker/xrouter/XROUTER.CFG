# Minimal XRouter config for Packet.NET interop tests.
#
# Tested against ghcr.io/packethacking/xrouter:latest.
#
# Exposes:
#   - Telnet on :23 (mapped to host :8023)
#   - JSON API / web UI on :8086
#   - AXUDP listener on :8095 — peered with a test client expected on
#     172.30.0.1:8094 (the AxudpSocket bound by the interop test, which
#     appears at the docker bridge gateway IP from inside the container).
#
# XRouter's AXUDP is a peer-pair link (not a generic listener), so the
# test peer must use a specific local UDP port that matches the IPLINK
# / UDPREMOTE configured here.
#
# Comment lines must start in column 1 (XRouter is strict about this).

NODECALL=PN0XRT
NODEALIAS=PNXRT
LOCATOR=IO91WL

# RHPPORT — open XRouter's RHPv2 (Radio Host Protocol) JSON-over-TCP server.
# Must be explicit (without it the listener doesn't open on the Linux build —
# the same finding as rhp2lib's XRouterFixture). Exposed to the host so the
# interop suite can DIFF pdn's own RHPv2 server against the real XRouter wire
# (tests/Packet.Interop.Tests/Xrouter/XRouterRhpWireDiffTests.cs).
RHPPORT=9000

# NODESINTERVAL — minutes between NET/ROM NODES broadcasts. Pin it to the
# 1-minute minimum so the Packet.NET read-only NET/ROM interop test
# (NetRomNodesIngestViaNetsim) reliably hears PN0XRT/PNXRT broadcast on the
# netsim channel within its window. Default XRouter cadence is longer + erratic
# in this image. Harmless to the existing AX.25 interop tests (they dial PN0XRT
# and don't care about the broadcast cadence).
NODESINTERVAL=1

# CTEXT is the welcome banner XRouter sends on connect-accept, but it
# fires on the ALIAS path only: clients that connect to NODEALIAS
# (PNXRT) receive it as an I-frame after UA; clients that connect to
# NODECALL (PN0XRT) get the node-prompt silently — no banner, but the
# command interpreter is still active and will respond to e.g. "?\r".
#
# Our interop tests dial NODECALL, so this block is dead config on the
# current test path: XRouter accepts the SABM and returns UA without
# any CTEXT-equivalent gate (unlike LinBPQ, which DOES require CTEXT
# to engage its node application on connect-accept).
#
# Kept here as documentation of XRouter's banner format and to support
# a future alias-connect test. Block terminator is a literal *** on
# its own line, same convention as LinBPQ.
CTEXT
PN0XRT Packet.NET interop test XRouter node.
Type ? for command list.
***

# IPADDRESS doubles as XRouter's bind address for IP services (HTTP,
# AXUDP, etc.). Pinning it to the container's static IP on the rfnet
# bridge so the AXUDP listener binds somewhere reachable from outside
# the container — 127.0.0.1 inside would never see host-NAT'd traffic.
# This IP is set by compose.interop.yml's networks.rfnet.ipv4_address.
IPADDRESS=172.30.0.11

INTERFACE=1
    TYPE=AXUDP
    MTU=256
ENDINTERFACE

PORT=1
    ID=axudp peer for Packet.NET
    INTERFACENUM=1
    UDPLOCAL=8095
    IPLINK=172.30.0.1
    UDPREMOTE=8094
    PORTCALL=PN0XRT-1
ENDPORT

# KISS-over-TCP attach to net-sim. XRouter splits the concern compared
# to LinBPQ's single PORT block: an INTERFACE declares the transport
# (TCP, plain KISS, MTU), and a PORT binds to it via INTERFACENUM. Same
# overall pattern as packet-net/test-net's working XRouter configs.
#
# IOADDR is net-sim's pinned static IP on the rfnet bridge — XRouter's
# IOADDR (like LinBPQ's IPADDR) does not resolve docker service names,
# only literal addresses. INTNUM is net-sim's KISS-TCP port for node d
# (XRouter's dedicated channel in the netsim topology); see
# docker/netsim/network.yaml.
INTERFACE=2
    ID=NETSIM
    TYPE=TCP
    PROTOCOL=KISS
    MTU=256
    IOADDR=172.30.0.12
    INTNUM=8103
ENDINTERFACE

PORT=2
    ID=netsim
    INTERFACENUM=2
    CHANNEL=A
    QUALITY=192
    MAXFRAME=4
    PACLEN=120
    FRACK=3000
    RESPTIME=1000
    RETRIES=10
    MHEARD=25
ENDPORT
