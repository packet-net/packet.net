# Dire Wolf "responder" instance — runs the connected-mode AX.25 engine
# (ax25_link.c) that the AGW echo helper drives. Its single radio channel
# uses the PulseAudio null sink (the shared simulated-RF channel); the AGW
# server on 8000 lets the echo helper register the called callsign, accept
# the incoming connect, and echo connected data.
#
# A registered client app on a real (MEDIUM_RADIO) channel is the ONLY way
# Dire Wolf services an incoming connect — see docker/direwolf/Dockerfile for
# the source-level reasoning. The modulo is NOT configured here: an inbound
# SABME makes Dire Wolf call set_version_2_2 (modulo 128) and answer UA on
# its own (ax25_link.c sabm_e_frame, state_0_disconnected). EMAXFRAME caps
# the mod-128 window; PACLEN caps the info field (drives segmentation tests).

ADEVICE default
ACHANNELS 1
CHANNEL 0
MYCALL N0RESP
MODEM 1200

# Connected-mode tuning. EMAXFRAME is the mod-128 window (k); PACLEN is N1.
PACLEN 128
EMAXFRAME 7
MAXFRAME 7

# AGW server for the echo helper. KISS disabled — connected mode is AGW-only.
AGWPORT 8000
KISSPORT 0
