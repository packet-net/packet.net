# Route ALSA's default PCM/CTL to the running PulseAudio server. Dire Wolf is
# an ALSA application; with this in place `ADEVICE default` records from /
# plays to PulseAudio (the null sink the entrypoint sets as the default
# sink/source), which is the shared simulated-RF channel.
pcm.!default { type pulse }
ctl.!default { type pulse }
pcm.pulse    { type pulse }
ctl.pulse    { type pulse }
