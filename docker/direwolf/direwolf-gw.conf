# Dire Wolf "gateway" instance — a transparent KISS-TCP modem. Our
# Ax25Session attaches to its KISSPORT (8001) and its single radio channel
# uses the same PulseAudio null sink as the responder, so frames our session
# emits are AFSK1200-modulated onto the shared RF channel and the responder's
# modem demodulates them (and vice versa).
#
# KISS frames bypass Dire Wolf's ax25_link.c entirely, so this instance does
# NO connected-mode processing — it is purely the radio (modem) for our side
# of the link. Its MYCALL is cosmetic: we never address it; our session uses
# its own source callsign and the responder's callsign as destination.

ADEVICE default
ACHANNELS 1
CHANNEL 0
MYCALL N0GW
MODEM 1200

# No AGW. KISS-TCP server on 8001 (our Ax25Session dials this as a client).
AGWPORT 0
KISSPORT 8001
