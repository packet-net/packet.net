; ===========================================================================
; Minimal LinBPQ config for Packet.NET interop tests.
;
; Uses LinBPQ's SIMPLE=1 mode which auto-defaults the dozens of L3/L4
; parameters (OBSINIT, NODESINTERVAL, MAXLINKS, T3, …) that would otherwise
; need to be specified individually. Patterned after LinBPQ's own integration-
; test fixture template (tests/integration/helpers/linbpq_instance.py).
;
; Exposes:
;   - Telnet (node prompt) on :8010    (user=admin pass=admin, sysop)
;   - HTTP (web UI)         on :8008
;   - AGW                   on :8000
;   - AXIP/AXUDP listener   on :8093
;
; Dials out:
;   - KISS-TCP to netsim 172.30.0.12:8102 — BPQ is the TCP client; net-sim
;     hosts the listener and bridges bytes through the simulated RF
;     channel. Used by LinbpqViaNetsimConnectedMode. BPQ retries the dial
;     until the listener answers, so startup ordering is not strict
;     (compose still has depends_on: netsim healthy belt-and-braces).
;
; KISS-TCP PORT block follows m0lte/test-net's working configs: no PORTNUM=
; (auto-numbered), no per-port MYCALL (inherits NODECALL=PN0TST), no
; KISSOPTIONS (plain KISS, no ACKMODE), no CONFIG line. CHANNEL=A is
; mandatory. AX.25 timing block (FRACK / RESPTIME / RETRIES / MAXFRAME /
; PACLEN) is the test-net default tuned for a simulated channel.
;
; ---------------------------------------------------------------------------
; mod-128 / extended (SABME) — NOT available in this image. (v2.2 arc V5b finding.)
;
; LinBPQ 6.0.25.23 (this pinned image) does NOT implement mod-128 at the
; AX.25 L2 layer. Its frame handler (L2Code.c ~line 687) answers an inbound
; SABME with an FRMR ("invalid control field"):
;     if (CTLlessPF == SABME) {
;         // Although some say V2.2 requires SABME I don't agree!
;         // Reject until we support Mod 128
;         L2SENDINVALIDCTRL(...); return; }
; Outbound, BPQ only ever sends SABM (no SABME-send path); its XID handler is
; clamped to "Mod 8 and 256 Byte frames". MAXFRAME=1..127 (advertised in the
; BPQ docs) sets only the mod-8 *window cap* — the framing stays mod-8. So
; there is NO config that makes BPQ accept a SABME / run mod-128; the limit is
; in the compiled L2 code, not a tunable. Adding a "second extended-capable
; port" was investigated and is impossible for this reason. MAXFRAME is left
; at 4 (mod-8) for the connect/disconnect + I-frame interop tests.
;
; The extended-mode interop test (LinbpqViaNetsimExtendedMode) therefore
; targets the *version-negotiation fallback* instead: our SABME → BPQ FRMR →
; we fall back to v2.0/SABM → mod-8 Connected. See that file's remarks and
; docs/plan.md §7.1 / §17.
; ===========================================================================

; SIMPLE=1 must come first — it seeds sensible defaults for every
; global tunable (MAXCIRCUITS, T3, IDLETIME, …) AND enables NODE=1 +
; BBS=1, which together make BPQ accept an L2 connection AND have an
; application listening to respond on it. Without an application,
; BPQ accepts the SABM but stays silent after UA, which an interop
; test sees as "link healthy but data-layer dead". The previous
; revision of this file added an explicit NODE=1 + BBS=0 thinking
; that was the fix; in fact SIMPLE=1 already had NODE=1 set, and our
; BBS=0 was overriding SIMPLE's BBS=1 to no useful effect for these
; tests. Reverted to plain SIMPLE=1.
; See https://m0lte.github.io/linbpq/configuration/reference/?h=simple#quick-start-simple-mode
;
; CTEXT: ... *** is the welcome banner sent on every L2 connection
; (NOT seeded by SIMPLE — it's mandatory if you want a banner before
; the CMD: prompt). Kept here so the interop test can wait for a
; well-known non-empty first I-frame before sending its command.
;
; NET/ROM L4 (the NetRomL4CircuitViaNetsim interop test) needs NO extra
; config here: SIMPLE=1 seeds NODE=1 + the L4 transport defaults
; (MAXCIRCUITS, L4WINDOW=4, L4TIMEOUT, L4RETRIES, L3TIMETOLIVE, …), and the
; netsim PORT's QUALITY=192 (below, required for NODES) is equally what lets
; that port carry NET/ROM circuits. With this, BPQ both ORIGINATES an L4
; circuit to pdn (a sysop `C <pdn-alias>`) and ACCEPTS pdn's outbound circuit,
; verified on the wire (§7.1 / §17 2026-06-05).
SIMPLE=1
NODECALL=PN0TST
NODEALIAS=PNTST
LOCATOR=IO91WL
AGWPORT=8000

; PASSWORD — the sysop unlock secret for BPQ's *positional-challenge* auth.
;
; This is NOT a plain password. At the node prompt, the bare command
;   PASSWORD
; makes BPQ reply with FIVE 1-based character positions, e.g. "3 1 4 1 5",
; chosen at random (with repeats) from this string. The caller answers with
; the FIVE characters at those positions, concatenated as one token (here,
; positions 3 1 4 1 5 of WONTLISTEN = "NWTWL"). BPQ sums the ASCII bytes of
; the reply and compares to the sum it precomputed from the challenge; a match
; flips the session to authorised (PASSWORD=0xFFFF) and unlocks the SYSOP
; command set (which includes SENDNODES). Source: Cmd.c PWDCMD() (the rand()%
; PWLen position loop) + the n<PASSCMD sysop gate. BPQ uppercases the configured
; text (_strupr in config.c), so the secret here is effectively WONTLISTEN.
;
; The NetRomNodesIngestViaNetsim interop test authenticates over telnet as a
; NON-sysop user (USER=netop below) precisely to exercise this real challenge
; — the admin SYSOP user is a Secure_Session and would shortcut PASSWORD to an
; instant Ok, bypassing the mechanism we want to prove. After authenticating it
; issues SENDNODES to force an immediate NODES broadcast on the netsim port.
PASSWORD=WONTLISTEN

; NODESINTERVAL — minutes between NET/ROM NODES broadcasts. SIMPLE=1 defaults
; this to BPQ's stock 60 minutes, far too long for a CI interop test that wants
; to observe a NODES broadcast within seconds. Pin it to the 1-minute minimum so
; the Packet.NET read-only NET/ROM interop test (NetRomNodesIngestViaNetsim)
; reliably hears PN0TST/PNTST advertise itself on the netsim channel. Harmless to
; the existing AX.25 interop tests (they connect to PN0TST and don't care about
; the broadcast cadence). BPQ broadcasts its own node + alias even with an empty
; routing table, which is exactly what the read-only ingest test asserts.
NODESINTERVAL=1

CTEXT:
PN0TST Packet.NET interop test node
***

PORT
 ID=Telnet
 DRIVER=Telnet
 CONFIG
 TCPPORT=8010
 HTTPPORT=8008
 MAXSESSIONS=10
 USER=admin,admin,PN0TST,,SYSOP
 ; A deliberately NON-sysop telnet user. Logging in as this user yields a
 ; plain (non-Secure_Session) node session, so the bare PASSWORD command
 ; issues the real positional challenge instead of the Secure_Session
 ; instant-Ok shortcut. NetRomNodesIngestViaNetsim logs in here, answers the
 ; challenge from PASSWORD=WONTLISTEN, and then issues SENDNODES — proving the
 ; genuine PASSWORD -> SENDNODES sysop handshake works from the harness.
 USER=netop,netop,PN0TST,,
ENDPORT

; AXIP / AXUDP port (BPQAXIP driver) — AX.25 frames over UDP.
;
; FCS IS MANDATORY ON THIS DRIVER (source-verified, not a quirk we chose).
; bpqaxip.c's UDP receive path computes the CRC-16/X.25 FCS over the WHOLE
; datagram and drops anything whose residue isn't 0xf0b8 ("BPQAXIP Invalid CRC"):
;   crc = compute_crc(&rxbuff[0], len);
;   if (crc == 0xf0b8) { len -= 2; ... } else { /* logged + dropped */ }
; and the send path appends the 2-octet FCS (low byte first):
;   crc = compute_crc(&buff->DEST[0], txlen - 2); crc ^= 0xffff;
;   buff->DEST[txlen-2] = crc & 0xff; buff->DEST[txlen-1] = crc >> 8;
; There is NO per-MAP "no CRC" knob — the FCS is unconditional on UDP. So a peer
; MUST send the FCS-bearing form and MUST tolerate an FCS on receive. pdn's AXUDP
; transport unconditionally carries the FCS (the FCS-less form interoperated with
; nothing and was removed), so it talks to this driver out of the box. compute_crc
; here uses CRCTAB =
; bit-reversed-0x1021 (init 0xffff, final ^0xffff, low byte first), byte-for-byte
; identical to Packet.Core.Crc16Ccitt, so the two FCSes interoperate exactly.
;
; This one AXIP port serves two distinct interop tiers, so its CONFIG block carries
; a few items working together (each annotated inline below):
;   - AUTOADDQUIET: auto-learn a reply route (call->ip:port) from inbound frames so
;     a peer dialling IN is reachable for the UA/ack without a static MAP — WITHOUT
;     marking it a NODES-broadcast recipient (the connected-mode AX.25 tests).
;   - BROADCAST NODES + `B`-flagged MAPs: make BPQ deliver its NODES broadcast over
;     this point-to-point port (the Tier-2 frame-perfect NET/ROM tests).
;   - MAP PNAX25-1 (no B): a STATIC reply route + the dial-OUT route BPQ uses when a
;     node user types `C <axip-port> PNAX25-1` (Direction B, a plain L2 connect).
; 172.30.0.1 is the rfnet bridge gateway = the host (where each test's pdn binds);
; the UDP port on each MAP line is that test's fixed local port. QUALITY/MINQUAL let
; the AXIP port carry routed NET/ROM connects.
PORT
 ID=AXIP
 DRIVER=BPQAXIP
 QUALITY=200
 MINQUAL=1
 CONFIG
 UDP 8093
 ; AUTOADDQUIET (not AUTOADDMAP): auto-learn a reply route (call->ip:port) from the
 ; first inbound frame — so a peer dialling IN is reachable for the UA/ack without a
 ; static MAP — but do NOT flag the auto-added entry as a NODES-broadcast recipient.
 ; This matters because the port now carries BROADCAST NODES (below) for the NET/ROM
 ; tests: AUTOADDMAP sets the per-entry broadcast flag TRUE (bpqaxip.c L2205), so it
 ; would make BPQ blast its periodic NODES at EVERY transient AUTOADD'd peer —
 ; including the connected-mode / FCS-guard tests' endpoints, whose assertions (e.g.
 ; FcsLess_Sabm_IsDropped: "an FCS-less SABM gets NO reply") then intermittently
 ; catch a stray NODES. AUTOADDQUIET sets the broadcast flag FALSE (L2212), so only
 ; the explicitly `B`-flagged NET/ROM MAP entries below receive NODES; AUTOADD reply
 ; routing for the other tests is otherwise unchanged.
 AUTOADDQUIET
 ; BROADCAST NODES — register the NET/ROM NODES pseudo-destination as a broadcast
 ; address on this point-to-point AXIP port. Required for BPQ to DELIVER its own
 ; NODES broadcast over AXUDP: bpqaxip.c's TX path (AXIP_TX -> SendFrame) sends a
 ; frame only to MAP entries whose callsign matches the frame's DESTINATION, and a
 ; NODES UI frame is addressed to the pseudo-call NODES — which matches no
 ; per-station MAP, so a stock AXIP port silently drops its own NODES (verified:
 ; zero NODES datagrams reach a peer without this). With BROADCAST NODES + a MAP
 ; entry carrying the per-entry `B` (broadcast-recipient) flag, BPQ emits its
 ; PN0TST>NODES UI to that peer over UDP exactly as it does over RF. This is the
 ; AXUDP counterpart of the netsim port's QUALITY=192 NODES-enablement (a per-port
 ; broadcast-delivery config, NOT an AX.25 protocol change). Used by the Tier-2
 ; frame-perfect NET/ROM interop tests (NetRom*ViaAxudp); see docs/plan.md §7.
 BROADCAST NODES
 ; Direct-AX.25 connect target (Direction B of LinbpqViaAxudpConnectedMode): NO `B`
 ; flag, so BPQ does NOT advertise NODES to it and `C 2 PNAX25-1` is a plain L2
 ; connect, not a NET/ROM-routed circuit. 172.30.0.1 = the rfnet bridge gateway =
 ; the host (where the test's pdn binds); UDP 8190 is that test's fixed LocalPort.
 MAP PNAX25-1 172.30.0.1 UDP 8190
 ; NET/ROM interop targets (NetRom*ViaAxudp): DISTINCT callsigns + DISTINCT fixed
 ; ports — both from the connected-mode tests (so the shared BPQ daemon can't
 ; confuse a learned NET/ROM route with the direct-connect PNAX25-1 link) AND from
 ; each other (each NET/ROM test is its own isolated BPQ link/route, so a leftover
 ; interlink or learned node from one can't perturb the other when the serialised
 ; group runs them back-to-back). Both carry the `B` broadcast-recipient flag so
 ; BPQ delivers its NODES to them. PNL4AX-1 = NetRomNodesIngestViaAxudp (port 8194);
 ; PNL4BX-1 = NetRomL4CircuitViaAxudp (port 8195).
 MAP PNL4AX-1 172.30.0.1 UDP 8194 B
 MAP PNL4BX-1 172.30.0.1 UDP 8195 B
 ; ax25-ts Tier-2 AXUDP NET/ROM ingest target (m0lte/ax25-ts:
 ; tests/integration/netrom-nodes-ingest-via-axudp.test.ts — the AXUDP analog of
 ; ax25-ts's net-sim NODES-ingest test, run by THIS repo's interop.yml phase-B
 ; sibling-clone step). DISTINCT callsign + DISTINCT fixed port from every C#
 ; AXUDP test above (so the shared BPQ daemon can't confuse links/routes between
 ; the C# and TypeScript suites, which run in the same phase-B / NET/ROM-phase
 ; against the same fixture). Carries the `B` broadcast-recipient flag so BPQ
 ; delivers its NODES to this `B`-flagged recipient. NOTE the ax25-ts netrom
 ; module is READ-ONLY (no TX) where the C# NetRom*ViaAxudp peers run a full
 ; NetRomService that broadcasts its own NODES — but the `B` flag alone is NOT
 ; sufficient: verified on the wire, BPQ delivers NODES to this MAP only once it
 ; has HEARD the peer's own NODES on the port (i.e. treats it as a live NET/ROM
 ; neighbour); a purely passive listener that never transmits hears nothing.
 ; The ax25-ts test therefore warms BPQ by sending its own NODES through the
 ; shared AxudpTransport (the seam a transmitting netrom layer would use) so BPQ
 ; reciprocates — the `B`-flagged MAP is what AUTHORISES the delivery, the warming
 ; is what TRIGGERS it. 172.30.0.1 = the rfnet bridge gateway = the host (where the
 ; ax25-ts test process binds, same as the C# tests); UDP 8196 is its fixed
 ; LocalPort. PNTSAX-1 = ax25-ts netrom-nodes-ingest-via-axudp.
 MAP PNTSAX-1 172.30.0.1 UDP 8196 B
ENDPORT

PORT
 ID=netsim
 TYPE=ASYNC
 PROTOCOL=KISS
 IPADDR=172.30.0.12
 TCPPORT=8102
 CHANNEL=A
 SPEED=1200
 TXDELAY=100
 FRACK=3000
 RESPTIME=1000
 RETRIES=10
 MAXFRAME=4
 PACLEN=120
 INTERLOCK=0
 MHEARD=Y
 ; QUALITY — REQUIRED for BPQ to broadcast NODES out this port. BPQ's NODES
 ; sender (L3Code.c SENDNEXTNODESFRAGMENT, the `PORT->PORTQUALITY == 0` skip)
 ; silently skips any port whose QUALITY is 0, and the per-PORT config default
 ; IS 0 (config.c memsets the port struct before each PORT block). Without this
 ; line, SENDNODES returns "Ok" but puts NOTHING on the netsim channel — which
 ; is exactly why earlier runs saw LinBPQ stay silent. A non-zero QUALITY makes
 ; the netsim port a real NET/ROM-advertising interface so SENDNODES (and the
 ; periodic NODESINTERVAL broadcast) actually emit the PN0TST/PNTST NODES frame
 ; that NetRomNodesIngestViaNetsim ingests. 192 mirrors a typical VHF port
 ; quality and is harmless to the existing connect/I-frame interop tests.
 QUALITY=192
ENDPORT
