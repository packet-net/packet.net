  # ─── SABM/SABME received while we ourselves are awaiting connection ──
  #
  # SABM → collision recovery: respond UA, stay (our own SABM may still
  # be in flight). SABME → reply DM and shift to the v2.2 collision
  # state (figc4.6).

  - id: t23_sabm_received
    on: SABM_received
    path:
      - { action: "F := P", kind: processing }
      - { action: UA,        kind: signal_lower }
    next: AwaitingConnection
    notes: |
      Collision recovery: SABM from peer while our own SABM is in flight.
      Reply UA, stay (our own SABM may still get its UA).

      NOTE: direwolf author at src/ax25_link.c:4390-4392 explicitly
      confirms this reading: "Erratum! 2006 version shows SABME twice
      for state 1. First one should be SABM in last page of Figure C4.2.
      Original appears to be correct." Triangulated upstream-spec
      finding — the 2006 version of figc4.2 has a SABM/SABME swap bug.
    references:
      - source: spec_prose
        cite: "§6.3.6"
        quote: "Collision Recovery"
      - source: linbpq
        path: L2Code.c
        function: L2LINKACTIVE
        line: 1243
        note: "SABM in state 1 (XID-sent) calls L2SABM, sends UA via SETUPNEWL2SESSION. State 2 collision falls through; F:=P semantics not modelled — verification pending"
      - source: direwolf
        path: src/ax25_link.c
        function: sabm_e_frame
        line: 4388
        note: "case state_1 !extended: build UA with f=p, stay in state 1. Author erratum comment 4390-4392 confirms original 1998 figure is correct (2006 has SABM/SABME swap bug)"
      - source: rax25
        path: src/state.rs
        function: "AwaitingConnection::sabm"
        line: 1250
        note: "returns SendUa{pf: packet.poll}; F:=P implicit via UA's pf field; stays in AwaitingConnection. Matches spec"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: ax25_std_state1_machine
        line: 42
        note: "sets modulus/window, sends UA with pf passed through (F:=P implicit), stays"

  - id: t24_sabme_received
    on: SABME_received
    path:
      - { action: "F := P", kind: processing }
      - { action: DM,        kind: signal_lower }
    next: AwaitingConnection22
    notes: |
      SABME received while we sent SABM (v2.0). Reply DM and move to
      'Awaiting 2.2 Connection' (state 5 in the figure / figc4.6) — peer
      wants v2.2, we'll handle the next collision step there.
    references:
      - source: direwolf
        path: src/ax25_link.c
        function: sabm_e_frame
        line: 4379
        note: "case state_1 extended: build DM with f=p, enter_new_state(state_5_awaiting_v22_connection). Matches spec; direwolf explicitly notes 'Don't combine with state 5. They are slightly different.' at 4377"
      # linbpq: omit — SABME rejected globally via L2SENDINVALIDCTRL (no Mod-128 support)
      # rax25: omit — sabme returns SendDm{pf} but stays; TODO comment 'supposed to transition to awaiting connect 2.2'
      # linux_oot: omit — DIVERGES: replies UA (not DM) to SABME and stays in STATE_1; no separate 2.2-awaiting state
