# Data-Link state machine: Disconnected state.
#
# Source: AX.25 v2.2 rev 4 (Oct 2025), figure C4.1 "Data Link Disconnected
# State". Transcribed from spec-sdl/data-link/DataLink_Disconnected.graphml.
#
# 14 input columns → 17 transitions after enumerating the binary decision
# branches (UI's "P == 1?", and one "Able to Establish?" per SABM/SABME).
machine: data_link
state: Disconnected
coverage: complete
source:
  spec: ax.25.2.2.4_Oct_25
  figure: figc4.1
  url: https://raw.githubusercontent.com/packethacking/ax25spec/main/doc/media/figc4.1.png

# Per-source commit pins for cross-reference citations in transitions[].references[].
# Pinning to specific commits means line numbers stay valid; bumping requires
# auditing the citations for any drift.
pinned_refs:
  linbpq:
    repo: https://github.com/M0LTE/linbpq
    commit: 88a68988b446187cc5f7a2dfdbe33d1cc3ebd46f
  direwolf:
    repo: https://github.com/wb2osz/direwolf
    commit: a231971a652bfb574a4bae9a5d875fbce53d2267
  rax25:
    repo: https://github.com/ThomasHabets/rax25
    commit: d97b7ab725620497d5444e7393969b8d6f9ae58d
  linux_oot:
    repo: https://github.com/linux-netdev/mod-orphan
    commit: 40188e901024be90f50fc37ba1ba3a84678dfe12

decisions:
  - id: ui_p_eq_1
    question: "P == 1?"
    predicate: P_eq_1
  - id: sabm_able_to_establish
    question: "Able to Establish?"
    predicate: able_to_establish
  - id: sabme_able_to_establish
    question: "Able to Establish?"
    predicate: able_to_establish

transitions:
  # ─── Upper-layer primitives (d5: "Signal reception from Lower Layer") ─

  - id: t01_dl_disconnect_request
    on: DL_DISCONNECT_request
    path:
      - { action: DL_DISCONNECT_confirm, kind: signal_upper }
    next: Disconnected
    notes: |
      spec_prose: not in §6.3.5; standard DL primitive behaviour —
      if the upper layer requests disconnect while already disconnected,
      the data-link immediately confirms back. See §6.3.4 (link
      disconnection procedure) for the broader context.

  - id: t02_dl_unit_data_request
    on: DL_UNIT_DATA_request
    path:
      - { action: UI_command, kind: signal_lower }
    next: Disconnected
    notes: |
      spec_prose: §6.3.5 silent; UI frame handling defined in §4.3.3.6
      (UI frame) and §6.4. Connectionless data path — disconnected
      state can still send UI frames at the upper layer's request.

  - id: t03_dl_connect_request
    on: DL_CONNECT_request
    path:
      - { action: "SRT := Initial Default", kind: processing }
      - { action: "T1V := 2 * SRT",          kind: processing }
      - { action: Establish_Data_Link,        kind: subroutine }
      - { action: set_layer_3_initiated,      kind: processing }
    next: AwaitingConnection
    notes: |
      spec_prose: §6.3.5 ¶2 ("a TNC may initiate a link set up as
      outlined in connection establishment") + §6.3.1 ¶1 (sends a SABM
      command frame and starts T1). Establish_Data_Link is the
      subroutine defined in figc4.7.

  - id: t04_all_other_primitives_from_lower_layer
    on: all_other_primitives__from_lower_layer
    path: []
    next: Disconnected
    notes: |
      spec_prose: catch-all column with no prose backing. Receive any
      unhandled primitive drawn with the "Signal reception from Lower
      Layer" shape (d5), stay in Disconnected, do nothing. Standard
      SDL convention for "everything else from this source class".

  # ─── Received frames (d5: "Signal reception from upper layer") ────────

  - id: t05_all_other_commands
    on: all_other_commands
    path:
      - { action: "F := P", kind: processing }
      - { action: DM,        kind: signal_lower }
    next: Disconnected
    notes: |
      spec_prose: §6.3.5 ¶3 — "Any TNC receiving a command frame other
      than a SABM(E) or UI frame…responds with a DM frame with the F
      bit set to '1'. The offending frame is ignored." Catch-all for
      received command frames not handled by SABM/SABME/DISC/UI
      explicitly. F := P sets F to the incoming P bit (typically 1 on a
      polled command frame).

  - id: t06_all_other_primitives_from_upper_layer
    on: all_other_primitives__from_upper_layer
    path:
      - { action: discard_primitive, kind: processing }
    next: Disconnected
    notes: |
      spec_prose: catch-all column with no prose backing. Receive any
      unhandled primitive drawn with the "Signal reception from upper
      layer" shape (d5), discard it, stay in Disconnected.

  - id: t07_control_field_error
    on: control_field_error
    path:
      - { action: DL_ERROR_indication_L, kind: signal_upper }
    next: Disconnected
    notes: |
      spec_prose: §C "error indications are discussed in the SDL
      appendices" — code letter (L) is figure-authoritative.

  - id: t08_info_not_permitted_in_frame
    on: info_not_permitted_in_frame
    path:
      - { action: DL_ERROR_indication_M, kind: signal_upper }
    next: Disconnected
    notes: |
      spec_prose: figure-authoritative (DL-ERROR code M). See t07 note.

  - id: t09_u_or_s_frame_length_error
    on: u_or_s_frame_length_error
    path:
      - { action: DL_ERROR_indication_N, kind: signal_upper }
    next: Disconnected
    notes: |
      spec_prose: figure-authoritative (DL-ERROR code N). See t07 note.

  - id: t10_ua_received
    on: UA_received
    path:
      - { action: DL_ERROR_indication_C_D, kind: signal_upper }
    next: Disconnected
    notes: |
      spec_prose: unexpected UA while disconnected (UA is a response;
      we didn't send a command). Codes C and D are figure-authoritative.

  - id: t11_ui_received_p_eq_1
    on: UI_received
    path:
      - { action: UI_Check, kind: subroutine }
      - { decision: ui_p_eq_1, branch: "Yes" }
      - { action: "F := 1",  kind: processing }
      - { action: DM,         kind: signal_lower }
    next: Disconnected
    notes: |
      spec_prose: §6.3.5 ¶3 — "UI frame with the P bit set to '1'
      responds with a DM frame with the F bit set to '1'". Figure
      sets F := 1 explicitly (vs F := P for other command frames in
      t05) — i.e. the spec dictates F=1 specifically for polled UI.

  - id: t12_ui_received_p_eq_0
    on: UI_received
    path:
      - { action: UI_Check, kind: subroutine }
      - { decision: ui_p_eq_1, branch: "No" }
    next: Disconnected
    notes: |
      spec_prose: §6.3.5 ¶3 — UI with P=0 falls under "the offending
      frame is ignored" (no DM response). UI_Check subroutine still
      runs to surface the UI payload to upper layer.

  - id: t13_disc_received
    on: DISC_received
    path:
      - { action: "F := P", kind: processing }
      - { action: DM,        kind: signal_lower }
    next: Disconnected
    notes: |
      spec_prose: §6.3.5 ¶1 — "transmits a DM frame in response to a
      DISC command".
    references:
      - source: spec_prose
        cite: "§6.3.5 ¶1"
        quote: "transmits a DM frame in response to a DISC command"
      - source: linbpq
        path: L2Code.c
        function: L2FORUS
        line: 735
        note: "no-session catch-all — sends DM when received command is neither SABM nor XID and has P=1; ignores P=0 (figure responds unconditionally with F:=P)"
      - source: direwolf
        path: src/ax25_link.c
        function: disc_frame
        line: 4524
        note: "state_0_disconnected case sends DM via lm_data_request"
      - source: rax25
        path: src/state.rs
        function: "Disconnected::disc"
        line: 1164
        note: "returns Action::SendDm { pf: packet.poll }"
      - source: linux_oot
        path: net/ax25/ax25_in.c
        function: ax25_rcv
        line: 327
        note: "state-0 catch-all — calls ax25_return_dm when no ax25_cb exists and frame isn't SABM/SABME/DM. Same code path handles t05, t10, t13 by exclusion."

  - id: t14_sabm_received_able
    on: SABM_received
    path:
      - { action: "F := P", kind: processing }
      - { decision: sabm_able_to_establish, branch: "Yes" }
      - { action: set_version_2_0,           kind: processing }
      - { action: UA,                         kind: signal_lower }
      - { action: Clear_Exception_Conditions, kind: subroutine }
      - { action: "V(s) := 0", kind: processing }
      - { action: "V(a) := 0", kind: processing }
      - { action: "V(r) := 0", kind: processing }
      - { action: DL_CONNECT_indication,      kind: signal_upper }
      - { action: "SRT := Initial Default",   kind: processing }
      - { action: "T1V := 2 * SRT",           kind: processing }
      - { action: start_T3,                    kind: processing }
      - { action: "RC := 0",                   kind: processing }
    next: Connected
    notes: |
      spec_prose: §6.3.5 ¶1 + §6.3.1 ¶1 — "responds with a UA response
      frame and resets all of its internal state variables (V(S), V(A)
      and V(R))". The figure adds DL_CONNECT_indication (notify upper
      layer), SRT/T1V init, start_T3, RC := 0 — the Connected-state
      entry housekeeping not detailed in this prose paragraph but
      implied by §6.7 (timer parameters) and the SDL appendix.

  - id: t15_sabm_received_unable
    on: SABM_received
    path:
      - { action: "F := P", kind: processing }
      - { decision: sabm_able_to_establish, branch: "No" }
      - { action: DM, kind: signal_lower }
    next: Disconnected
    notes: |
      spec_prose: §6.3.1 ¶3 — "If the distant TNC receives a SABM(E)
      command and cannot enter the indicated state, it sends a DM frame."

  - id: t16_sabme_received_able
    on: SABME_received
    path:
      - { action: "F := P", kind: processing }
      - { decision: sabme_able_to_establish, branch: "Yes" }
      - { action: set_version_2_2,           kind: processing }
      - { action: UA,                         kind: signal_lower }
      - { action: Clear_Exception_Conditions, kind: subroutine }
      - { action: "V(s) := 0", kind: processing }
      - { action: "V(a) := 0", kind: processing }
      - { action: "V(r) := 0", kind: processing }
      - { action: DL_CONNECT_indication,      kind: signal_upper }
      - { action: "SRT := Initial Default",   kind: processing }
      - { action: "T1V := 2 * SRT",           kind: processing }
      - { action: start_T3,                    kind: processing }
      - { action: "RC := 0",                   kind: processing }
    next: Connected
    notes: |
      spec_prose: as t14 — §6.3.5 ¶1 + §6.3.1 ¶1. SABME is the v2.2
      variant of SABM; this column sets Version 2.2 and otherwise
      mirrors t14's chain.

  - id: t17_sabme_received_unable
    on: SABME_received
    path:
      - { action: "F := P", kind: processing }
      - { decision: sabme_able_to_establish, branch: "No" }
      - { action: DM, kind: signal_lower }
    next: Disconnected
    notes: |
      spec_prose: as t15 — §6.3.1 ¶3.
