# Data-Link state machine: Connected state.
#
# Source: AX.25 v2.2 rev 4 (Oct 2025), figure C4.4 "Data Link Connected
# State". Transcribed from spec-sdl/data-link/DataLink_Connected.graphml.
#
# 26 input columns → 66 transitions after enumerating decision branches.
# This is the biggest figure in the AX.25 spec — the connected state has
# to handle the full set of frame types, flow control, error events, and
# user-initiated primitives.
#
# Decision naming convention on this page: predicate-canonical with no
# context prefix. Where a predicate (e.g. P_eq_1, Version 2.2?, V(a) <=
# N(r) <= V(s)?) appears in multiple drawn diamonds across columns, the
# YAML deduplicates to one `decisions:` entry — different columns'
# transitions reference the same id. This is canonicalisation, not loss
# of fidelity: the predicate is the same, only the figure-position
# differs.
machine: data_link
state: Connected
coverage: complete
source:
  spec: ax.25.2.2.4_Oct_25
  figure: figc4.4
  url: https://raw.githubusercontent.com/packethacking/ax25spec/main/doc/media/figc4.4a.png

# Per-source commit pins for cross-reference citations in transitions[].references[].
# Notable patterns surfaced across all four implementations on this page:
# - rax25 and direwolf both fuse Connected (state 3) with TimerRecovery (state 4)
#   into a single handler discriminated by an internal flag/enum. figc4.5's
#   transcription will share many code paths with this page.
# - All four implementations bypass DL-UNIT-DATA Request (t23) — UI is sent via
#   APRS/KISS/socket layers rather than through the LAPB state machine.
# - LinBPQ disables spec-compliant FRMR recovery via the FRMRHACK macro
#   (L2Code.c:24) — treats FRMR as DM (link drop). Original spec-compliant code
#   is commented out at L2Code.c:2192-2202.
# - Linux silently drops AX25_SREJ as AX25_ILLEGAL (no SREJ implementation at all).
# - DL-ERROR codes (A/C/D/F/K/L/M/N/O) are inconsistently surfaced — direwolf
#   logs them as text messages, rax25 emits typed DlError variants for some,
#   LinBPQ and Linux mostly omit.
pinned_refs:
  linbpq:
    repo: https://github.com/M0LTE/linbpq
    commit: 88a68988b446187cc5f7a2dfdbe33d1cc3ebd46f
  direwolf:
    repo: https://github.com/wb2osz/direwolf
    commit: a231971a652bfb574a4bae9a5d875fbce53d2267
  rax25:
    repo: https://github.com/ThomasHabets/rax25
    commit: d97b7ab725620497d5444e7393969b8d6f9ae58d
  linux_oot:
    repo: https://github.com/linux-netdev/mod-orphan
    commit: 40188e901024be90f50fc37ba1ba3a84678dfe12

decisions:
  # ─── Frame-reception predicates (used on I-received column) ─────────
  - id: command
    question: "Command?"
    predicate: command
  - id: info_field_valid
    question: "Info Field Length <= N1 and Content is Octet Aligned?"
    predicate: info_field_valid

  # ─── Sequence-number predicates ─────────────────────────────────────
  - id: nr_in_window
    question: "V(a) <= N(r) <= V(s)?"
    predicate: V_a_le_N_r_le_V_s
  - id: ns_eq_vr
    question: "N(s) == V(r)?"
    predicate: N_s_eq_V_r
  - id: ns_gt_vr_plus_1
    question: "N(s) > V(r) + 1?"
    predicate: N_s_gt_V_r_plus_1
  - id: vs_eq_va
    question: "V(s) == V(a)?"
    predicate: V_s_eq_V_a
  - id: vs_eq_va_plus_k
    question: "V(s) == V(a) + k?"
    predicate: V_s_eq_V_a_plus_k

  # ─── Flag predicates ────────────────────────────────────────────────
  - id: own_receiver_busy
    question: "Own Receiver Busy?"
    predicate: own_receiver_busy
  - id: peer_receiver_busy
    question: "Peer Receiver Busy?"
    predicate: peer_receiver_busy
  - id: reject_exception
    question: "Reject Exception?"
    predicate: reject_exception
  - id: srej_enabled
    question: "SREJ Enabled?"
    predicate: srej_enabled
  - id: srej_exception_gt_0
    question: "SReject Exception > 0?"
    predicate: srej_exception_gt_0
  - id: ack_pending
    question: "Ack Pending?"
    predicate: acknowledge_pending
  - id: vr_i_frame_stored
    question: "V(r) I Frame Stored?"
    predicate: V_r_I_frame_stored
  - id: version_2_2
    question: "Version 2.2?"
    predicate: version_2_2

  # ─── Frame-bit predicates ───────────────────────────────────────────
  - id: p_eq_1
    question: "P == 1?"
    predicate: P_eq_1
  - id: p_or_f_eq_1
    question: "P/F == 1?"
    predicate: P_or_F_eq_1

  # ─── Timer predicates ───────────────────────────────────────────────
  - id: t1_running
    question: "T1 Running?"
    predicate: T1_running

transitions:
  # ─── Column 1: DL-DISCONNECT Request ────────────────────────────────

  - id: t01_dl_disconnect_request
    on: DL_DISCONNECT_request
    path:
      - { action: discard_I_frame_queue, kind: processing }
      - { action: "RC := 0",              kind: processing }
      - { action: "DISC (P = 1)",         kind: signal_lower }
      - { action: stop_T3,                kind: processing }
      - { action: start_T1,               kind: processing }
    next: AwaitingRelease
    notes: |
      Upper layer requests disconnect. Tear down: discard pending I
      frames, reset retry counter, send DISC with P=1, swap timers
      (stop T3, start T1 for the DISC ack wait), → AwaitingRelease.

  # ─── Column 2: I received (16 paths — the biggest in figc4.4) ───────
  #
  # n134 Command? — n135 Info Field Length valid? — n139 V(a)<=N(r)<=V(s)?
  #   n140 Check I Frames Acknowledged
  #     n144 Own Receiver Busy?
  #       Yes → n175 Discard Contents — n176 P==1?
  #         Yes → F:=1; N(r):=V(r); RR; Clear Ack Pending → Connected
  #         No  → Connected
  #       No → n145 N(s)==V(r)?
  #         Yes → n146 V(r):=V(r)+1; Clear Reject Exc; Decrement SREJ-exc;
  #               DL-DATA Indication;
  #               n148 V(r) I Frame Stored?
  #                 (only No-path drawn — see note)
  #                 n152 P==1?
  #                   Yes → F:=1; N(r):=V(r); RR; Clear Ack Pending → Connected
  #                   No  → n153 Ack Pending?
  #                     Yes → Connected
  #                     No  → LM-SEIZE Request; Set Ack Pending → Connected
  #         No → n161 Reject Exception?
  #           Yes → n162 Discard Contents — n163 P==1?
  #             Yes → F:=1; N(r):=V(r); RR; Clear Ack Pending → Connected
  #             No  → Connected
  #           No → n164 SREJ Enabled?
  #             Yes → n167 Save Contents — n168 SReject Exception > 0?
  #               Yes → n169 N(r):=N(s); F:=0; n170 Increment SREJ-exc; SREJ → Connected
  #               No  → n173 N(s) > V(r)+1?
  #                 Yes → n165 Discard Contents; Set Reject Exc; F:=P; N(r):=V(r); REJ; Clear Ack Pending → Connected
  #                 No  → n174 N(r):=V(r); F:=1; n170 Increment SREJ-exc; SREJ → Connected
  #             No → n165 Discard Contents; Set Reject Exc; F:=P; N(r):=V(r); REJ; Clear Ack Pending → Connected
  #   No (N(r) outside V(a)..V(s)) → n116 N(r) Error Recovery — n124 Version 2.2?
  #     Yes → Awaiting 2.2 Connection
  #     No  → Awaiting Connection
  # No (Info Field Length invalid) → DL-ERROR(O); Establish Data Link; Clear L3 Initiated; n124 Version 2.2?
  #   Yes → Awaiting 2.2 Connection
  #   No  → Awaiting Connection
  # No (not a command) → DL-ERROR(O); Discard I Frame → Connected

    references:
      - source: spec_prose
        cite: "§6.3.4 ¶1"
        quote: "While in the information-transfer state, either TNC may indicate a request to disconnect the link by transmitting a DISC command frame and starting timer T1."
      - source: linbpq
        path: L4Code.c
        function: "CLOSECURRENTSESSION"
        line: 1086
        note: "sets DISCPENDING if TX_Q non-empty; immediate state 4 + T1=1 otherwise — figure says always discard + DISC(P=1)"
      - source: direwolf
        path: src/ax25_link.c
        function: "dl_disconnect_request"
        line: 1170
        note: "state_3/state_4 fall-through: discard queue, DISC cmd P=1, STOP_T3 / START_T1, → state_2"
      - source: rax25
        path: src/state.rs
        function: "Connected::disconnect"
        line: 1472
        note: "fused Connected+TimerRecovery; clears iframe queue, rc=0, sends DISC, → AwaitingRelease. Author TODO flag on timer choice."
      - source: linux_oot
        path: net/ax25/af_ax25.c
        function: "ax25_release"
        line: 1031
        note: "STATE_3/STATE_4 branch — Linux collapses Connected and TimerRecovery into one DISC path"
  - id: t02_i_received_not_command
    on: I_received
    path:
      - { decision: command, branch: "No" }
      - { action: DL_ERROR_indication_O, kind: signal_upper }
      - { action: discard_I_frame,        kind: processing }
    next: Connected
    notes: |
      I frame received as a response rather than a command — protocol
      error. DL-ERROR(O), discard, stay.

    references:
      - source: linbpq
        path: L2Code.c
        function: "SDIFRM"
        line: 2641
        note: "in-sequence path; LinBPQ funnels all I-frame logic through SDIFRM → PROC_I_FRAME → no spec_prose-mapped command check"
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2648
        note: "state_3/state_4 entry. States 3 & 4 share body — divergence from figure"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1553
        note: "Author rejects spec's DlError::O on non-command I: \"not even remotely correct, since O means packet too big\" — emits DlError::S instead"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 254
        note: "no separate command-check; non-I frames fall to default (silent drop)"
  - id: t03_i_received_command_info_field_invalid_v22
    on: I_received
    path:
      - { decision: command,          branch: "Yes" }
      - { decision: info_field_valid, branch: "No" }
      - { action: DL_ERROR_indication_O,     kind: signal_upper }
      - { action: Establish_Data_Link,        kind: subroutine }
      - { action: clear_layer_3_initiated,    kind: processing }
      - { decision: version_2_2,      branch: "Yes" }
    next: AwaitingConnection22
    notes: |
      Bad I-frame info field (length > N1 or not octet-aligned), v2.2 peer.
      Re-establish link via the v2.2 path.

    references:
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2754
        note: "bad-info-length path: DL-ERROR(O) message, establish_data_link, state→1 or 5 (modulo-128 author enhancement)"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1561
        note: "Payload>N1 → establish_data_link + DlError::O + AwaitingConnection. Author TODO: \"should we discard it?\""
      - source: linbpq
        path: L2Code.c
        function: "PROC_I_FRAME"
        line: 2914
        note: "Length<1 or >257 → silent ReleaseBuffer. No DL-ERROR(O), no Establish — diverges from figure"
  - id: t04_i_received_command_info_field_invalid_v20
    on: I_received
    path:
      - { decision: command,          branch: "Yes" }
      - { decision: info_field_valid, branch: "No" }
      - { action: DL_ERROR_indication_O,     kind: signal_upper }
      - { action: Establish_Data_Link,        kind: subroutine }
      - { action: clear_layer_3_initiated,    kind: processing }
      - { decision: version_2_2,      branch: "No" }
    next: AwaitingConnection
    notes: |
      Bad I-frame info field, v2.0 peer. Re-establish via v2.0 path.

    references:
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2754
        note: "same code path as t03 — direwolf has no v2.0/v2.2 split for bad info length"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1561
        note: "same as t03"
      - source: linbpq
        path: L2Code.c
        function: "PROC_I_FRAME"
        line: 2914
        note: "same as t03 — LinBPQ has no v22/v20 distinction for info-field length"
  - id: t05_i_received_command_info_valid_nr_out_of_window_v22
    on: I_received
    path:
      - { decision: command,          branch: "Yes" }
      - { decision: info_field_valid, branch: "Yes" }
      - { decision: nr_in_window,     branch: "No" }
      - { action: N_r_Error_Recovery, kind: subroutine }
      - { decision: version_2_2,      branch: "Yes" }
    next: AwaitingConnection22
    notes: |
      N(r) outside the V(a)..V(s) window — peer ACK is invalid. Recover
      via re-establish on v2.2 path.

    references:
      - source: linbpq
        path: L2Code.c
        function: "SDNRCHK"
        line: 2968
        note: "LinBPQ collapse: all N(r) errors → SDFRMR/FRMR state. No N(r) Error Recovery → AwaitingConnection22"
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2747
        note: "is_good_nr false → nr_error_recovery, → state 1 or 5 (author enhancement: modulo==128 ? state_5 : state_1)"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1571
        note: "N(R) out of range → nr_error_recovery + transition AwaitingConnection"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 209
        note: "ax25_validate_nr fails → nr_error_recovery + STATE_1"
  - id: t06_i_received_command_info_valid_nr_out_of_window_v20
    on: I_received
    path:
      - { decision: command,          branch: "Yes" }
      - { decision: info_field_valid, branch: "Yes" }
      - { decision: nr_in_window,     branch: "No" }
      - { action: N_r_Error_Recovery, kind: subroutine }
      - { decision: version_2_2,      branch: "No" }
    next: AwaitingConnection
    notes: |
      As t05 but v2.0 peer.

    references:
      - source: linbpq
        path: L2Code.c
        function: "SDNRCHK"
        line: 2968
        note: "same path as t05 — no v22/v20 split"
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2747
        note: "same as t05"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1571
        note: "same as t05"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 209
        note: "same as t05"
  - id: t07_i_received_own_busy_p_eq_1
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
      - { decision: info_field_valid,   branch: "Yes" }
      - { decision: nr_in_window,       branch: "Yes" }
      - { action: Check_I_Frames_Acknowledged, kind: subroutine }
      - { decision: own_receiver_busy,  branch: "Yes" }
      - { action: discard_contents_of_I_frame, kind: processing }
      - { decision: p_eq_1,             branch: "Yes" }
      - { action: "F := 1",             kind: processing }
      - { action: "N(r) := V(r)",       kind: processing }
      - { action: RR,                   kind: signal_lower }
      - { action: clear_acknowledge_pending, kind: processing }
    next: Connected
    notes: |
      Own receiver is busy — drop the I-frame's contents. Peer polled
      (P=1) so we owe a status response: RR with F=1.

    references:
      - source: spec_prose
        cite: "§6.4.2.2"
        quote: "If the TNC is in a busy condition, it ignores any received I frames without reporting this condition, other than repeating the indication of the busy condition."
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2711
        note: "own_receiver_busy && p==1: send RNR response. Author flags \"should be unreachable because we currently don't have a way to set own_receiver_busy\" — figure path effectively dead in direwolf"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1604
        note: "own_receiver_busy: discard iframe (implicit), optionally send RNR if polled. Author note \"discord (implicit)\" typo"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 219
        note: "OWN_RX_BUSY: discard, send enquiry_response only if P=1, no V(r) advance"
      - source: linbpq
        path: L2Code.c
        function: "RR_OR_RNR"
        line: 4173
        note: "no separate own-busy-discard inside SDIFRM — busy decided dynamically at response-send time (QCOUNT<20)"
  - id: t08_i_received_own_busy_p_eq_0
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
      - { decision: info_field_valid,   branch: "Yes" }
      - { decision: nr_in_window,       branch: "Yes" }
      - { action: Check_I_Frames_Acknowledged, kind: subroutine }
      - { decision: own_receiver_busy,  branch: "Yes" }
      - { action: discard_contents_of_I_frame, kind: processing }
      - { decision: p_eq_1,             branch: "No" }
    next: Connected
    notes: |
      Own busy and not polled — just drop the frame, stay.

    references:
      - source: spec_prose
        cite: "§6.4.2.2"
        quote: "If the TNC is in a busy condition, it ignores any received I frames without reporting this condition, other than repeating the indication of the busy condition."
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame"
        line: 2707
        note: "own_receiver_busy with !P=1: implicit no-op. See t07 note about unreachable code."
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 219
        note: "same OWN_RX_BUSY branch; P=0 takes the no-response path"
  - id: t09_i_received_in_seq_no_stored_p_eq_1
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
      - { decision: info_field_valid,   branch: "Yes" }
      - { decision: nr_in_window,       branch: "Yes" }
      - { action: Check_I_Frames_Acknowledged, kind: subroutine }
      - { decision: own_receiver_busy,  branch: "No" }
      - { decision: ns_eq_vr,           branch: "Yes" }
      - { action: "V(r) := V(r) + 1",            kind: processing }
      - { action: clear_reject_exception,         kind: processing }
      - { action: "decrement_srej_exception_if_gt_0", kind: processing }
      - { action: DL_DATA_indication,             kind: signal_upper }
      - { decision: vr_i_frame_stored,  branch: "No" }
      - { decision: p_eq_1,             branch: "Yes" }
      - { action: "F := 1",             kind: processing }
      - { action: "N(r) := V(r)",       kind: processing }
      - { action: RR,                   kind: signal_lower }
      - { action: clear_acknowledge_pending, kind: processing }
    next: Connected
    notes: |
      In-sequence I frame received, no stored frame for V(r), peer
      polled. Deliver data, advance V(r), respond RR(F=1).

    references:
      - source: spec_prose
        cite: "§6.4.2.1"
        quote: "If a TNC receives a valid I frame...it accepts the received I frame, increments its receive state variable, and acts in one of the following manners: …the receiving TNC sends an RR frame with N(R) equal to V(R)."
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame_continued"
        line: 2927
        note: "P=1 path: send RR response with F=1 after in-order delivery"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1635
        note: "After in-order delivery with poll: send RR F=1, clear acknowledge_pending"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 229
        note: "ns==vr with pf=1: send enquiry_response (RR/RNR F=1) instead of arming T2"
      - source: linbpq
        path: L2Code.c
        function: "SDIFRM"
        line: 2688
        note: "P-bit set → SEND_RR_RESP(LINK, PFBIT) at 2708"
  - id: t10_i_received_in_seq_no_stored_p_eq_0_ack_pending
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
      - { decision: info_field_valid,   branch: "Yes" }
      - { decision: nr_in_window,       branch: "Yes" }
      - { action: Check_I_Frames_Acknowledged, kind: subroutine }
      - { decision: own_receiver_busy,  branch: "No" }
      - { decision: ns_eq_vr,           branch: "Yes" }
      - { action: "V(r) := V(r) + 1",            kind: processing }
      - { action: clear_reject_exception,         kind: processing }
      - { action: "decrement_srej_exception_if_gt_0", kind: processing }
      - { action: DL_DATA_indication,             kind: signal_upper }
      - { decision: vr_i_frame_stored,  branch: "No" }
      - { decision: p_eq_1,             branch: "No" }
      - { decision: ack_pending,        branch: "Yes" }
    next: Connected
    notes: |
      In-sequence data; not polled; ack already pending — let it batch.

    references:
      - source: spec_prose
        cite: "§6.4.2.1"
        quote: "If there are no outstanding I frames, the receiving TNC sends an RR frame with N(R) equal to V(R). The receiving TNC may wait a small period of time before sending the RR frame to be sure additional I frames are not being transmitted."
      - source: direwolf
        path: src/ax25_link.c
        function: "i_frame_continued"
        line: 2956
        note: "P=0, ack_pending: no-op; will piggyback or T2-fire later"
      - source: rax25
        path: src/state.rs
        function: "Connected::iframe"
        line: 1644
        note: "In-order, no poll: set acknowledge_pending. Comment \"LM seize request (?)\""
      - source: linbpq
        path: L2Code.c
        function: "PROC_I_FRAME"
        line: 2930
        note: "Sets L2ACKREQ = PORTT2 (delayed-ack) — equivalent to ack-pending; sent later via L2TimerProc:3533"
      - source: linux_oot
        path: net/ax25/ax25_std_in.c
        function: "ax25_std_state3_machine"
        line: 232
        note: "ACK_PENDING set + T2 started when pf=0 — T2 is Linux's deferred-ack timer (figc4.4 LM-SEIZE-request analogue)"
  - id: t11_i_received_in_seq_no_stored_p_eq_0_no_ack_pending
    on: I_received
    path:
      - { decision: command,            branch: "Yes" }
      - { decision: info_field_valid,   branch: "Yes" }
      - { decision: nr_in_window,       branch: "Yes" }
      - { action: Check_I_Frames_Acknowledged, kind: subroutine }
      - { decision: own_receiver_busy,  branch: "No" }
      - { decision: ns_eq_vr,           branch: "Yes" }
      - { action: "V(r) := V(r) + 1",            kind: processing }
      - { action: clear_reject_exception,         kind: processing }
      - { action: "decrement_srej_exception_if_gt_0", kind: processing }
      - { action: DL_DATA_indication,             kind: signal_upper }
      - { decision: vr_i_frame_stored,  branch: "No" }
      - { decision: p_eq_1,             branch: "No" }
