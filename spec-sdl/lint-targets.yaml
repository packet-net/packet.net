# Per-runtime lint configuration for codegen-time consistency checks.
#
# Each target points at a runtime's bindings / dispatcher / subroutine
# files, with regexes tuned to that language's syntax. Missing files
# silently skip the relevant lint for that target (preserves the
# "standalone codegen invocation" behaviour the existing lints already
# support — e.g. building the library without C# / TS runtimes on disk).
#
# Runtime-agnostic lints (state-target, catchall-coverage) don't read
# this file — they operate on SDL pages directly.
#
# A target can omit any of `bindings`, `dispatcher`, or `subroutines` —
# absent sections short-circuit the corresponding lint for that target.
# This is the escape hatch for runtimes that don't have a static
# registry to lint against (e.g. the TS subroutine registry is
# runtime-registered with no static name list, so it has no
# `subroutines:` entry — the subroutine-coverage lint silently skips
# for TS).
#
# Paths are resolved relative to the codegen tool's working directory
# (typically the repo root). When adding a new runtime, drop a target
# block in here; no Program.cs changes required.
targets:
  - language: csharp
    bindings:
      path: src/Packet.Ax25/Session/Ax25SessionBindings.cs
      # Match `["name"]` indexer literals — both the dictionary-
      # initializer form (`["foo"] = ...`) and any other use of the
      # same indexer syntax.
      regex: '\["([A-Za-z_][A-Za-z0-9_]*)"\]'
    dispatcher:
      path: src/Packet.Ax25/Session/ActionDispatcher.cs
      # Match `case "literal":` arms. Body can contain any non-quote
      # character (the dispatcher's verb spellings include spaces,
      # parens, equals, colons, arrows — but no embedded quotes or
      # escape sequences in practice).
      regex: 'case\s+"([^"]+)"\s*:'
    subroutines:
      path: src/Packet.Ax25/Session/SubroutineRegistry.cs
      # Match `["name"] = "..."` indexer-literal entries inside the
      # LegacyAliases dictionary initialiser. Anchored to lines that
      # contain `= "` (the value-assignment part of the dict literal)
      # so it doesn't over-match generic `["foo"]` indexers.
      regex: '\["([A-Za-z_][A-Za-z0-9_]*)"\]\s*=\s*"'

  - language: typescript
    bindings:
      path: web/ax25-ts/src/sdl/session-bindings.ts
      # Match `bindings.set("name"` — including multi-line forms
      # where `set(` is on one line and the string literal sits on
      # the next (`\s*` covers newlines because .NET Regex defaults
      # to `\s` matching `\n`). Worked example: matches all 41
      # bindings in session-bindings.ts as of 2026-05-16, including
      # the 3 multi-line forms (`selective_reject_exception`,
      # `out_of_sequence_frames_in_receive_buffer`, `v_s_eq_x`).
      regex: 'bindings\.set\(\s*"([A-Za-z_][A-Za-z0-9_]*)"'
    dispatcher:
      path: web/ax25-ts/src/sdl/action-dispatcher.ts
      # TS uses the same `case "literal":` syntax as C#. The TS
      # dispatcher has 146 case arms today, same shape as the C#
      # dispatcher.
      regex: 'case\s+"([^"]+)"\s*:'
    # No `subroutines:` entry — the TS subroutine registry
    # (DefaultSubroutineRegistry) has no static name list; it
    # tolerates unknown subroutines by logging via the onUnknown
    # sink and continuing (no throw). The C# runtime's strict
    # subroutine lint doesn't translate. If a static TS subroutine
    # table appears in future, add a `subroutines:` entry here.
