# Canonical action verb catalog. Entries here normalise figure-verbatim
# verb spellings to a single canonical form used in the generated state
# machine code. Verbs not listed are passed through verbatim (soft mode).
#
# Why this file exists: the AX.25 SDL figures sometimes spell the same
# verb differently on different pages — e.g. figc4.2 draws `DM F=1`,
# figc4.3 draws `DM F = 1`, figc4.6 draws `DM (F = 1)`. Trust-the-figure
# requires the YAML transcriptions stay verbatim, but the runtime
# dispatcher needs a single canonical spelling per semantic verb.
#
# `actions.yaml` is the bridge: codegen reads it, substitutes aliases for
# the canonical `name:`, and emits the canonical into `.g.cs` files. The
# dispatcher's switch arms then only ever see canonical verbs.
#
# Grouped by SDL action kind (signal_upper, signal_lower, processing,
# subroutine, internal_out) — the kind both documents which figc1.1
# shape class the verb is drawn with, and lets the validator catch
# cases where the same canonical verb is drawn with different shape
# classes on different pages (which would be a transcription error).
#
# When to add an entry: when a single semantic action is spelled two or
# more different ways across pages. When only one spelling exists across
# every page, an entry is harmless but unnecessary.

signal_lower:
  - name: "DM (F = 1)"
    aliases:
      - "DM F=1"        # figc4.2 spelling
      - "DM F = 1"      # figc4.3 spelling

  # Supervisory-frame verbs (figc4.4 only). Naming convention from the
  # figure: the `_command` and `_response` suffixes mark explicit role;
  # bare verbs (RR, REJ, SREJ) are response-form per SDL convention.
  # Each emission consumes pending Nr + PfBit (defaults: Nr := V(R),
  # PfBit := false) — see ActionDispatcher.BuildSFrame.
  - name: RR_command
  - name: RR
  - name: RNR_response
  - name: REJ
  - name: SREJ

  # Unnumbered-frame verbs. Bare verbs (UA, DM, Expedited UA,
  # Expedited DM) consume pending PfBit; the rest force PfBit via the
  # explicit `(P = 1)` / `(P == 1)` / `(F = 1)` qualifier in the name.
  # Expedited variants set UFrameSpec.IsExpedited=true as a TX priority
  # hint. See ActionDispatcher.BuildUFrame.
  - name: UA
  - name: DM
  - name: "Expedited UA"
  - name: "Expedited DM"
  - name: "SABM (P == 1)"
  - name: "SABME (P = 1)"
  - name: "DISC (P = 1)"

  # UI-frame verb. Drawn in every state's DL_UNIT_DATA_request column
  # (figc4.1/4.2/4.3/4.4/4.6). Payload + PID come from the triggering
  # DL_UNIT_DATA_request primitive. P/F bit consumes pending (default
  # false) — see ActionDispatcher.BuildUiFrame.
  - name: UI_command

signal_upper:
  # DL primitives raised to Layer 3 (§5.5). The dispatcher emits each as
  # a DataLinkSignal record via the sendUpward callback. DL_DATA_indication
  # carries the incoming I-frame's Info + PID; the others have no payload.
  - name: DL_CONNECT_indication
  - name: DL_CONNECT_confirm
  - name: DL_DISCONNECT_indication
  - name: DL_DISCONNECT_confirm
  - name: DL_DATA_indication

  # DL-ERROR-indication letter variants (§C5). Each maps to
  # DataLinkErrorIndication("<letter>") via the suffix.
  - name: DL_ERROR_indication_C_D
  - name: DL_ERROR_indication_D
  - name: DL_ERROR_indication_E
  - name: DL_ERROR_indication_F
  - name: DL_ERROR_indication_G
  - name: DL_ERROR_indication_K
  - name: DL_ERROR_indication_L
  - name: DL_ERROR_indication_M
  - name: DL_ERROR_indication_N
  - name: DL_ERROR_indication_O
