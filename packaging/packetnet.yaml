# Packet.NET node configuration.
#
# This file is the node's config blob. It is watched for changes and
# hot-applied — most edits take effect without a restart. An invalid
# edit is rejected whole and the running config is kept (see the logs).
#
# Edit the callsign below, then add one or more ports under `ports:`.

schemaVersion: 1

identity:
  callsign: N0CALL        # <-- your station callsign, e.g. M0LTE-1
  # alias: LONDON         # optional node name
  # grid: IO91wm          # optional Maidenhead locator

# AX.25 ports. Empty = an idle node (still serves telnet + /healthz).
# Each port needs a stable, unique `id` (the hot-reload reconcile key)
# and a transport. Uncomment one of the examples to bring a port up.
ports: []
#  - id: vhf
#    enabled: true
#    transport:
#      kind: kiss-tcp      # serial-kiss | nino-tnc | kiss-tcp
#      host: 127.0.0.1
#      port: 8001
#    ax25:                 # optional — omit for spec defaults
#      t1Ms: 3000
#      n2: 10
#      windowSize: 4
#    kiss:                 # optional — applied live, no restart
#      txDelay: 30         # units of 10 ms
#      persistence: 63
#      slotTime: 10
#  - id: hf
#    enabled: false
#    transport:
#      kind: serial-kiss
#      device: /dev/ttyACM0
#      baud: 57600
#  - id: nino
#    enabled: false
#    transport:
#      kind: nino-tnc
#      device: /dev/ttyACM1
#      baud: 57600
#      mode: 6             # NinoTNC mode 0..15

# Operator-facing text. {node}/{call} are expanded.
services:
  banner: "Welcome to {node} ({call})"
  prompt: "{call}> "

# Management surfaces.
management:
  telnet:
    enabled: true
    bind: 127.0.0.1        # loopback only by default
    port: 8011
  http:
    bind: 127.0.0.1
    port: 8080
  # Optional HTTPS listener. Off by default. When enabled, a self-signed cert is
  # generated on first start (encrypts the channel; browsers warn until trusted) —
  # or point certificatePath at a trusted PKCS#12 (.pfx) for a trusted secure context
  # (needed for passkeys/WebAuthn over a LAN IP).
  # https:
  #   enabled: true
  #   bind: 0.0.0.0
  #   port: 8443
  #   # certificatePath: /etc/packetnet/server.pfx
  #   # certificatePassword: null
  #   generateSelfSignedOnMissing: true
  # Web/management authentication. Off by default; turn on to require a login on the
  # control panel (users + scopes are created via the first-run setup / the Users screen).
  # auth:
  #   enabled: true
  #   # accessTokenMinutes: 60        # short access JWT; the client silently renews it
  #   # refreshTokenMinutes: 10080    # 7d session; rotates one-time-use (must exceed access)
  #   # sysopElevationMinutes: 15     # how long an over-RF `SYSOP <code>` elevation lasts
  #   # webAuthn:                     # passkeys (default rp.id localhost — set on a real domain)
  #   #   relyingPartyId: pdn.example
  #   #   allowedOrigins: [ "https://pdn.example:8443" ]

# Applications — the app-extensibility platform. Each entry is an out-of-process program the
# node launches when a connected user types its `match` verb at the prompt; the session is
# bridged to the app over the pdn-app/1 stdio wire (docs/app-local-session-wire.md). The node
# shares no code with the app — any language works. Default: none (a node with no entries has
# no apps). The package ships the WALL example app (a Python message wall) under
# /usr/share/packetnet/apps/wall; uncomment to enable it (needs python3, a Recommends):
# applications:
#   - id: wall
#     match: WALL                 # users type WALL at the prompt to enter it
#     enabled: true
#     kind: process
#     command: /usr/bin/python3
#     args: [ /usr/share/packetnet/apps/wall/wall.py ]
#     workingDirectory: /var/lib/packetnet/apps/wall    # where wall.txt is kept (owned by the service user)
#     capabilities: [ session ]
#     # Optional human-plane web UI: run the app's own loopback web server (e.g.
#     #   python3 /usr/share/packetnet/apps/wall/wall_web.py 9090
#     # as your own service), then pdn reverse-proxies /apps/wall/ to it and shows a
#     # launcher tile. The app must bind loopback only. See docs/app-gateway.md.
#     ui:
#       upstream: http://127.0.0.1:9090
#       name: WALL
#       icon: message-square
#   # LOBBY — the long-running-socket rung: a daemon (Unix socket) holding shared in-memory
#   # state across users (live WHO + SAY broadcast), which the spawn-per-connect floor can't do.
#   # Run the daemon yourself (e.g. a systemd unit):
#   #   python3 /usr/share/packetnet/apps/lobby/lobby.py /run/packetnet/lobby.sock
#   # then pdn connects per session. See docs/app-local-session-wire.md §6.
#   - id: lobby
#     match: LOBBY
#     enabled: true
#     kind: socket
#     socketPath: /run/packetnet/lobby.sock
#     capabilities: [ session ]

# RHPv2 server — the app platform's NETWORK plane (PWP-0222/0245, XRouter-compatible).
# Lets an external application (e.g. DAPPS) open packet connections through this node over
# JSON-over-TCP. Default-off; loopback-bound (RHP has no TLS — never expose it publicly).
# See docs/rhp2-server.md.
# rhp:
#   enabled: true
#   bind: 127.0.0.1
#   port: 9000
#   requireAuth: false   # true => `auth` validated against the node's users first
