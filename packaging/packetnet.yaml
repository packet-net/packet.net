# Packet.NET node configuration.
#
# This file is the node's config blob. It is watched for changes and
# hot-applied — most edits take effect without a restart. An invalid
# edit is rejected whole and the running config is kept (see the logs).
#
# Edit the callsign below, then add one or more ports under `ports:`.

schemaVersion: 1

identity:
  callsign: N0CALL        # <-- your station callsign, e.g. M0LTE-1
  # alias: LONDON         # optional node name
  # grid: IO91wm          # optional Maidenhead locator

# AX.25 ports. Empty = an idle node (still serves telnet + /healthz).
# Each port needs a stable, unique `id` (the hot-reload reconcile key)
# and a transport. Uncomment one of the examples to bring a port up.
ports: []
#  - id: vhf
#    enabled: true
#    transport:
#      kind: kiss-tcp      # serial-kiss | nino-tnc | kiss-tcp
#      host: 127.0.0.1
#      port: 8001
#    ax25:                 # optional — omit for spec defaults
#      t1Ms: 3000
#      n2: 10
#      windowSize: 4
#    kiss:                 # optional — applied live, no restart
#      txDelay: 30         # units of 10 ms
#      persistence: 63
#      slotTime: 10
#  - id: hf
#    enabled: false
#    transport:
#      kind: serial-kiss
#      device: /dev/ttyACM0
#      baud: 57600
#  - id: nino
#    enabled: false
#    transport:
#      kind: nino-tnc
#      device: /dev/ttyACM1
#      baud: 57600
#      mode: 6             # NinoTNC mode 0..15

# Operator-facing text. {node}/{call} are expanded.
services:
  banner: "Welcome to {node} ({call})"
  prompt: "{call}> "

# Management surfaces.
management:
  telnet:
    enabled: true
    bind: 127.0.0.1        # loopback only by default
    port: 8011
  http:
    bind: 127.0.0.1
    port: 8080
  # Optional HTTPS listener. Off by default. When enabled, a self-signed cert is
  # generated on first start (encrypts the channel; browsers warn until trusted) —
  # or point certificatePath at a trusted PKCS#12 (.pfx) for a trusted secure context
  # (needed for passkeys/WebAuthn over a LAN IP).
  # https:
  #   enabled: true
  #   bind: 0.0.0.0
  #   port: 8443
  #   # certificatePath: /etc/packetnet/server.pfx
  #   # certificatePassword: null
  #   generateSelfSignedOnMissing: true
  # Web/management authentication. Off by default; turn on to require a login on the
  # control panel (users + scopes are created via the first-run setup / the Users screen).
  # auth:
  #   enabled: true
  #   # accessTokenMinutes: 60        # short access JWT; the client silently renews it
  #   # refreshTokenMinutes: 10080    # 7d session; rotates one-time-use (must exceed access)
  #   # sysopElevationMinutes: 15     # how long an over-RF `SYSOP <code>` elevation lasts
  #   # webAuthn:                     # passkeys (default rp.id localhost — set on a real domain)
  #   #   relyingPartyId: pdn.example
  #   #   allowedOrigins: [ "https://pdn.example:8443" ]
