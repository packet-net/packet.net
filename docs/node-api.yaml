openapi: 3.1.0
info:
  title: pdn node control API
  version: 0.1.0-draft
  description: >
    The operator control-plane API for the pdn (`packetnet`) packet-radio node —
    Phase 4 Slice 3. Served by the node itself from Kestrel (default
    `127.0.0.1:8080`). This contract is the boundary the Phase-5 web UI
    (`web/packetnet-ui`) builds against; it is DERIVED from that UI's typed client
    (`src/lib/api.ts` + `src/lib/types.ts`) + the design handoff, and is the spec the
    Slice-3 backend implements. See `docs/node-ui-design.md` (§6 data shapes, §7
    endpoint table) and `design_handoff_pdn_control_panel/README.md`.

    STATUS: draft. The web UI currently runs against a mock backend; this locks the
    shape so the backend can land behind it with no UI change. Auth + all write/action
    endpoints are security-sensitive and land in a later Slice-3 step (see §"x-slices").

servers:
  - url: /api/v1

x-slices:
  read-and-stream: [GET /status, GET /ports, GET /sessions, GET /netrom/routes, GET /config, GET /links, GET /log, GET /monitor/recent, GET /events, GET /traffic]
  auth: [POST /auth/login, WebAuthn register/authenticate, GET /setup/state, POST /setup, /users, TOTP]
  write-and-actions: [port lifecycle, PUT/PATCH /config, /sessions connect/disconnect/send, /ports/{id}/tune, /ports/{id}/tuning/* (deviation tuning), /ports/{id}/hail (SDM station hail), /ping, /beacons]

tags:
  - { name: status }
  - { name: ports }
  - { name: sessions }
  - { name: routes }
  - { name: config }
  - { name: monitor }
  - { name: radios }
  - { name: auth }
  - { name: users }
  - { name: tools }

security:
  - bearerAuth: []

paths:
  /status:
    get:
      tags: [status]
      summary: Node health summary (dashboard)
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NodeStatus" } } } }

  /ports:
    get:
      tags: [ports]
      summary: Live status of every configured port
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/PortStatus" } } } } }
    post:
      tags: [ports]
      summary: Add a port (writes config through the reconcile path)
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PortConfig" } } } }
      responses:
        "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } }
  /ports/{id}:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    get:
      tags: [ports]
      summary: One port's config + live status
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: object, properties: { config: { $ref: "#/components/schemas/PortConfig" }, status: { $ref: "#/components/schemas/PortStatus" } } } } } }
    put:
      tags: [ports]
      summary: Edit a port — full-object replace (returns the reconcile result)
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/PortConfig" } } } }
      responses:
        "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } }
        "404": { description: no such port }
        "422": { description: validation failed, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationProblem" } } } }
    delete:
      tags: [ports]
      summary: Remove a port
      security: [{ bearerAuth: [admin] }]
      responses: { "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } } }
  /ports/{id}/lifecycle:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [ports]
      summary: Bring a port up / down / restart
      security: [{ bearerAuth: [operate] }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [action], properties: { action: { type: string, enum: [up, down, restart] } } } } } }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/PortStatus" } } } } }
  /ports/{id}/tune:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Run a link-tuning burst (the Link Tuner workspace)
      description: Sends a numbered frame burst to a partner and returns per-frame ack/loss; tuneables can be applied live during a run.
      security: [{ bearerAuth: [operate] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/TuneBurstRequest" } } } }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TuneBurstResult" } } } } }

  /sessions:
    get:
      tags: [sessions]
      summary: Active connected-mode circuits
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/SessionInfo" } } } } }
    post:
      tags: [sessions]
      summary: Connect out (sysop interactive connect to a callsign/alias)
      security: [{ bearerAuth: [operate] }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [target], properties: { target: { type: string, description: callsign or NET/ROM alias }, portId: { type: string } } } } } }
      responses: { "200": { description: connecting, content: { application/json: { schema: { $ref: "#/components/schemas/SessionInfo" } } } } }
  /sessions/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    delete:
      tags: [sessions]
      summary: Disconnect a session
      security: [{ bearerAuth: [operate] }]
      responses: { "204": { description: disconnected } }
  /sessions/{id}/send:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    post:
      tags: [sessions]
      summary: Send one text line into a connected-mode session (minimal v1)
      security: [{ bearerAuth: [operate] }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [line], properties: { line: { type: string } } } } } }
      responses: { "202": { description: queued } }
  /sessions/{id}/stream:
    parameters: [{ name: id, in: path, required: true, schema: { type: string } }]
    get:
      tags: [sessions]
      summary: Interactive output stream for an adopted sysop connect-out (Server-Sent Events)
      description: >
        One SSE stream (`text/event-stream`) of a managed connect-out's terminal output — what
        the web console drawer reads to watch a session live. On subscribe the recent backlog
        (the banner/prompt the browser missed) is replayed first as a single `output` event,
        then each new output chunk arrives as its own `output` event. Every `output` event's
        `data:` line is the chunk JSON-encoded as a string (`JsonSerializer.Serialize(chunk)` —
        e.g. `"GB7RDG:RDG} \r"`); JSON-encoding is required so embedded CR/LF survive SSE's
        line framing. A periodic `: ping` comment heartbeats the stream. The stream ends when
        the peer goes away / the session is closed (the manager completes the channel) or when
        the client disconnects. Only sessions adopted by the sysop console manager (an
        operator connect-out) are streamable; any other id → 404.
      security: [{ bearerAuth: [operate] }]
      responses:
        "200":
          description: an output event stream
          content:
            text/event-stream:
              schema: { type: string, description: "SSE frames; each `output` event's data is a JSON-encoded text chunk" }
        "404": { description: no managed session with this id }

  /netrom/routes:
    get:
      tags: [routes]
      summary: NET/ROM routing snapshot (neighbours + destinations, incl. INP3 time-metric)
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NetRomRoutingSnapshot" } } } }

  /links:
    get:
      tags: [monitor]
      summary: Per-link stats rollup (RTT / retries / REJ-SREJ)
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/LinkStats" } } } } }

  /log:
    get:
      tags: [status]
      summary: Recent node log tail
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/LogLine" } } } } }

  /monitor/recent:
    get:
      tags: [monitor]
      summary: Recent frames (oldest→newest) so the monitor bootstraps with history
      description: >
        A bounded snapshot of the most recent decoded frames from the node's telemetry
        ring. The web monitor fetches this on open to seed its table, then live-streams
        from `/events` and dedupes the overlap by `seq`.
      security: [{ bearerAuth: [read] }]
      parameters:
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 250, default: 250 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MonitorEvent" } } } } }

  /traffic:
    get:
      tags: [monitor]
      summary: The persisted traffic log — recent frames newest-first (troubleshooting)
      description: >
        Reads the node's durable frame history from the separate traffic database
        (`traffic.db` — every AX.25 frame sent or received on every port, bounded by
        `traffic.retentionDays` + `traffic.maxMb`). Newest-first; filterable by port
        and an inclusive UTC time range. Returns an empty array when `traffic.enabled`
        is off (see `/status`'s `traffic` block for the flag + the dropped counter).
      security: [{ bearerAuth: [read] }]
      parameters:
        - { name: port, in: query, required: false, schema: { type: string } }
        - { name: since, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: until, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 1000, default: 250 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/TrafficFrame" } } } } }

  /events:
    get:
      tags: [monitor]
      summary: Server-Sent Events — the multiplexed live feed
      description: >
        One SSE stream (`text/event-stream`). Events are tagged by `event:` type and
        the client subscribes/filters. Types: `frame` (a MonitorEvent per AX.25 frame,
        high-rate — the monitor keeps a ring buffer), `session` (add/remove/state-change),
        `port` (state transition), `route` (routing-table update), `config` (a config
        reload happened). The server may coalesce high-rate `frame` events.
      security: [{ bearerAuth: [read] }]
      responses:
        "200":
          description: an event stream
          content:
            text/event-stream:
              schema: { type: string, description: "SSE frames; `frame` event data is a MonitorEvent JSON" }

  /heard:
    get:
      tags: [monitor]
      summary: Recently heard stations (the MHeard log) — most-recently-heard first
      description: >
        Stations heard (a received frame's source) per port, surviving port teardown +
        node restart. No `port` query → the node-wide view (each callsign merged across
        the ports it was heard on). `?port=<id>` → that port's stations. `lastRssiDbm` /
        `lastSnrDb` are the newest frame's RSSI/SNR when a radio control channel measured
        them, else null. `medianPreDataCarrierMs` is the rolling-median TXDELAY-as-heard,
        and `txDelayAdvisory` flags a peer keying excess preamble (see
        docs/research/txdelay-optimisation.md); `?txdelayThresholdMs=` overrides its
        threshold (default 250 ms).
      security: [{ bearerAuth: [read] }]
      parameters:
        - { name: port, in: query, required: false, schema: { type: string } }
        - { name: txdelayThresholdMs, in: query, required: false, schema: { type: number } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/HeardStation" } } } } }

  /radios:
    get:
      tags: [radios]
      summary: Per-port radio-control attachment status + health
      description: >
        One entry per port with a `radio:` block. `attached` distinguishes a radio the
        node has open and is polling from one configured-but-not-attached (the port is
        down, or the radio failed to open and the port degraded to running without it).
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/RadioStatus" } } } } }

  /ports/{id}/radio:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    get:
      tags: [radios]
      summary: One port's radio-control status + health
      description: "A configured port with no radio block returns attached=false with an empty kind; an unknown port id is 404."
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/RadioStatus" } } } }
        "404": { description: no such port }

  /rigs:
    get:
      tags: [rigs]
      summary: Per-port rig-control (CAT) attachment status
      description: >
        One entry per port with a `rig:` block — the station-control view of the transceiver
        (frequency, mode, PTT, TX meters) polled over hamlib's rigctld protocol or flrig.
        `attached` distinguishes a rig the node connected to and is polling from one
        configured-but-not-attached (the port is down, or the daemon was unreachable at
        bring-up and the port degraded to running without it). Read-only surface: the node
        never tunes, changes mode, or keys.
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/RigStatus" } } } } }

  /ports/{id}/rig:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    get:
      tags: [rigs]
      summary: One port's rig-control status
      description: "A configured port with no rig block returns attached=false with an empty kind; an unknown port id is 404."
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/RigStatus" } } } }
        "404": { description: no such port }

  /rigs/events:
    get:
      tags: [rigs]
      summary: Live rig poll-tick feed (SSE)
      description: >
        Server-Sent Events: one `event: rig` per poll tick per attached rig, each `data:` line a
        RigStatus JSON document. Idle rigs tick at the poll cadence (default 5 s); a keyed
        transmitter ticks at the meter cadence (default 1 s) so SWR/power are live during a
        transmission. Heartbeat comments (`: ping`) every 15 s. EventSource clients may pass the
        bearer token as `?access_token=` (the SSE allowlist covers this path).
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: SSE stream, content: { text/event-stream: { schema: { type: string } } } }

  /ports/{id}/doctor:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    get:
      tags: [tools]
      summary: Check radio setup — the capability doctor (safe, non-transmitting)
      description: >
        Runs the tuning capability probes against the running port's live handles and returns a
        plain-language pass/fail/unknown checklist with a remedy per failure. Read-scope and
        SAFE: it only runs the non-transmitting probes (TNC identity/firmware/DIPs/running mode,
        radio identity, GETRSSI availability). The transmitting probes (TXDELAY software-control,
        the SDM-enabled check, TNC↔radio pairing) are reported `unknown` with detail
        "requires a brief transmit — rerun with interrupt=true". A serial-KISS (non-NinoTNC)
        port reports the TNC-diagnostic probes as "not a NinoTNC"; a port with no radio gets a
        `radio-attached` "no radio attached" row. A `tait-transparent` (TNC-less) port instead
        returns the Transparent-readiness checklist (`transparent-mode-enabled` /
        `escape-recovers` / `baud-clean`): a running Transparent port's radio is a byte pipe with
        no CCDI control channel, so the enter/escape/baud-clean checks are behavioral only at
        setup time — run `packet-tune transparent-doctor <ccdiPort> [peerCcdiPort] --interrupt`
        against the radio in Command mode. An unknown or not-running port id is 404.
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/PortDoctorReport" } } } }
        "404": { description: unknown or not-running port }
    post:
      tags: [tools]
      summary: Check radio setup — full check that briefly transmits (interrupt)
      description: >
        The doctor with `interrupt=true` additionally runs the TRANSMITTING probes, which briefly
        KEY THE TRANSMITTER and perturb the TXDELAY register. Admin-scope and audited (mirrors the
        other transmitting endpoints). Without `interrupt=true` it behaves like the safe GET form.
        An unknown or not-running port id is 404.
      security: [{ bearerAuth: [admin] }]
      parameters:
        - name: interrupt
          in: query
          required: false
          description: "When true, run the transmitting probes too (briefly transmits)."
          schema: { type: boolean, default: false }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/PortDoctorReport" } } } }
        "404": { description: unknown or not-running port }

  /ports/{id}/tuning/session:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Arm a guided deviation-tuning session on a port
      description: >
        Start an operator-initiated, two-ended deviation-tuning session coordinated over the radios'
        SDM side channel. This port is one end (role `tuned` — the operator turns the TX-DEV pot here
        and the port transmits bursts on request; or `meter` — measures a remote peer). It KEYS THE
        RADIO and pauses the port's normal AX.25 traffic for the session, so it is admin-scoped and
        audited. The port is restored when the session ends. At most one session per port. The peer's
        SDM enabled state is checked fail-fast (a probe SDM). Subscribe to `.../tuning/events` for the
        live feed. 404 unknown/not-running port · 400 not a NinoTNC / no Tait radio / bad role or peer
        id / SDM disabled in the radio programming · 409 a session is already active.
      security: [{ bearerAuth: [admin] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TuningStartRequest" } } }
      responses:
        "200": { description: armed, content: { application/json: { schema: { $ref: "#/components/schemas/TuningSessionInfo" } } } }
        "400": { description: the port cannot host a session, or the request is malformed }
        "404": { description: unknown or not-running port }
        "409": { description: a tuning session is already active on the port }
    delete:
      tags: [tools]
      summary: Stop a tuning session and restore the port
      description: >
        End the port's tuning session and restore it to normal service (a full in-place port rebuild).
        Idempotent-ish — 404 when no session is active. Admin-scoped and audited. Also reachable as
        `POST .../tuning/stop`.
      security: [{ bearerAuth: [admin] }]
      responses:
        "200": { description: stopped }
        "404": { description: no session was active on the port }

  /ports/{id}/tuning/events:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    get:
      tags: [tools]
      summary: The live tuning-session feed (SSE)
      description: >
        A `text/event-stream` of the port's tuning session. Each event is a named `tuning` SSE event
        whose `data:` line is a camelCase JSON `TuningEvent`: per-round measurements
        (`kind=round` — burstIndex, decoded/total, levelDb?, advice, note) and lifecycle transitions
        (`kind` armed · peer-connected · awaiting-adjustment · ended · error). A new subscriber first
        receives the full history so far (so a late/reconnecting client sees the whole trend), then
        live events; the stream completes when the session ends. Read-scoped (pure observation);
        EventSource clients pass the token as `?access_token=`. 404 when no session is active.
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: "SSE stream (text/event-stream) of TuningEvent", content: { text/event-stream: { schema: { $ref: "#/components/schemas/TuningEvent" } } } }
        "404": { description: no session is active on the port }

  /ports/{id}/tuning/next:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Run the next measurement round (the tuned operator adjusted the pot)
      description: >
        The tuned operator's "I've adjusted the pot — run the next round" signal. Admin-scoped and
        audited. 404 when no session is active; 409 when no round is awaiting the operator (the round
        is still running, or this is a meter-role session where rounds are driven by the remote end).
      security: [{ bearerAuth: [admin] }]
      responses:
        "200": { description: the next round was triggered }
        "404": { description: no session is active on the port }
        "409": { description: no round is awaiting the operator (or a meter-role session) }

  /ports/{id}/tuning/stop:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Stop a tuning session and restore the port (alias of DELETE .../tuning/session)
      security: [{ bearerAuth: [admin] }]
      responses:
        "200": { description: stopped }
        "404": { description: no session was active on the port }

  /ports/{id}/tuning/txdelay-min:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Arm a TXDELAY-minimisation sweep on a port
      description: >
        Start an operator-initiated, two-station TXDELAY-minimisation session over the radios' SDM
        side channel (docs/research/txdelay-optimisation.md, layer 2). Role `coordinator` sweeps THIS
        port's own KISS TXDELAY down (it KEYS separately-keyed probe frames per step) and reports a
        knee + margin recommendation; role `meter` is passive decode counting for a remote coordinator.
        Both pause the port's normal AX.25 traffic; admin-scoped, audited, and the response carries an
        `rfCaveat`. Shares the one-session-per-port claim, the `.../tuning/events` feed (sweep steps
        arrive as `kind=round` events with `txDelayMs`/`preDataCarrierMs`) and the stop verbs with the
        deviation session. The sweep NEVER leaves a reduced TXDELAY in place — use `.../apply` to keep a
        value. 404 unknown/not-running port · 400 not a NinoTNC / no Tait radio / bad role or peer id /
        SDM disabled · 409 a session is already active.
      security: [{ bearerAuth: [admin] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TxDelayMinStartRequest" } } }
      responses:
        "200": { description: armed, content: { application/json: { schema: { type: object, properties: { session: { $ref: "#/components/schemas/TuningSessionInfo" }, rfCaveat: { type: string } } } } } }
        "400": { description: the port cannot host a session, or the request is malformed }
        "404": { description: unknown or not-running port }
        "409": { description: a tuning session is already active on the port }

  /ports/{id}/tuning/txdelay-min/apply:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Apply + verify a TXDELAY (explicit, after a sweep)
      description: >
        Set + settle + verify a specific TXDELAY (typically a sweep's recommendation) with the far
        meter counting probes, and — only when every verify probe decodes — persist it to the port's
        `kiss.txDelay` config (default; on the node the session-ending port rebuild re-applies the
        configured KISS params, so an unpersisted apply is transient). A failed verify restores the
        fallback. KEYS THE RADIO; admin-scoped, audited, `rfCaveat` on the response. 404/400/409 as for
        the sweep.
      security: [{ bearerAuth: [admin] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/TxDelayApplyRequest" } } }
      responses:
        "200": { description: armed, content: { application/json: { schema: { type: object, properties: { session: { $ref: "#/components/schemas/TuningSessionInfo" }, rfCaveat: { type: string } } } } } }
        "400": { description: the port cannot host a session, or the request is malformed }
        "404": { description: unknown or not-running port }
        "409": { description: a tuning session is already active on the port }

  /ports/{id}/hail:
    parameters: [{ $ref: "#/components/parameters/PortId" }]
    post:
      tags: [tools]
      summary: Hail a peer station over the SDM side channel and return its status
      description: >
        Send a HAIL to a peer over this port's radio SDM side channel and return the peer's status —
        callsign, current NinoTNC mode + bitrate, radio channel, supported modes, capabilities, and
        the peer's RSSI of the hail. Because the side channel rides the radio's own FFSK modem
        (independent of the packet modulation), the hail SUCCEEDS — and reveals the peer's mode —
        even when the two stations cannot reach each other on the packet path because of a MODE
        MISMATCH. That is its diagnostic value: nothing else in the stack can report a station you
        cannot decode. The hail TRANSMITS an SDM, so it is admin-scoped and audited. The node sources
        the reply from the peer; a resident hail responder (port config `radio.hailResponder`) answers
        the reverse direction. If no resident responder is bound, a fail-fast SDM-enabled preflight
        runs first. v1 is point-to-point; when a resident responder is armed, its bound peer is the
        only peer this endpoint can hail.
      security: [{ bearerAuth: [admin] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/HailRequest" } } }
      responses:
        "200": { description: the peer's status, content: { application/json: { schema: { $ref: "#/components/schemas/PortHailStatus" } } } }
        "400": { description: no Tait radio on the port · bad peer id · SDM disabled in the radio programming · a resident responder is bound to a different peer }
        "404": { description: unknown or not-running port }
        "502": { description: the hail could not be delivered over the SDM side channel }
        "504": { description: the peer did not answer before the timeout }

  /radios/scan:
    get:
      tags: [radios]
      summary: Scan the serial bus for attached radios (keyed by CCDI serial)
      description: >
        Probes candidate serial ports and returns each radio found, keyed by its CCDI
        serial number — the stable identity to bind a port by (`radio.serial:`), since
        device paths renumber and the CP2102 dongles' /dev/serial/by-id links can collide.
        Read-scope but it opens serial ports transiently; bounded + single-flight.
      security: [{ bearerAuth: [read] }]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/RadioScanResult" } } } } }

  /config:
    get:
      tags: [config]
      summary: The current NodeConfig
      security: [{ bearerAuth: [read] }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/NodeConfig" } } } } }
    put:
      tags: [config]
      summary: Replace the whole config (atomic validate-before-apply)
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NodeConfig" } } } }
      responses: { "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } }, "422": { description: validation failed, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationProblem" } } } } }
    patch:
      tags: [config]
      summary: Patch a config section (form-driven edits)
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, additionalProperties: true } } } }
      responses: { "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } } }
  /config/schema:
    get:
      tags: [config]
      summary: Field-metadata descriptor for the form editor (labels, units, help, apply-impact)
      security: [{ bearerAuth: [read] }]
      responses: { "200": { description: ok, content: { application/json: { schema: { type: object, additionalProperties: true } } } } }
  /config/raw:
    get:
      tags: [config]
      summary: The raw YAML config text (advanced editor)
      security: [{ bearerAuth: [admin] }]
      responses: { "200": { description: ok, content: { text/plain: { schema: { type: string } } } } }
    put:
      tags: [config]
      summary: Replace the raw YAML (validate-before-apply)
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { text/plain: { schema: { type: string } } } }
      responses: { "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } }, "422": { description: invalid, content: { application/json: { schema: { $ref: "#/components/schemas/ValidationProblem" } } } } }
  /config/validate:
    post:
      tags: [config]
      summary: Validate a candidate config + return the reconcile preview (no apply)
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/NodeConfig" } }, text/plain: { schema: { type: string } } } }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcilePreview" } } } } }

  /beacons:
    get:
      tags: [config]
      summary: Beacon (ID) settings — system default + per-port
      security: [{ bearerAuth: [read] }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/BeaconSettings" } } } } }
    put:
      tags: [config]
      summary: Update beacon settings
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/BeaconSettings" } } } }
      responses: { "200": { description: applied, content: { application/json: { schema: { $ref: "#/components/schemas/ReconcileResult" } } } } }

  /ping:
    post:
      tags: [tools]
      summary: Connectionless AX.25 TEST ping (the axping analogue)
      security: [{ bearerAuth: [operate] }]
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [station, portId], properties: { station: { type: string }, portId: { type: string }, count: { type: integer, default: 5 } } } } } }
      responses: { "200": { description: results, content: { application/json: { schema: { $ref: "#/components/schemas/PingResult" } } } } }

  /setup/state:
    get:
      tags: [auth]
      summary: Whether first-run setup is still required
      security: []
      responses: { "200": { description: ok, content: { application/json: { schema: { type: object, properties: { setupComplete: { type: boolean } } } } } } }
  /setup:
    post:
      tags: [auth]
      summary: Complete first-run setup (identity + first admin + optional first port). Requires the one-time setup token.
      security: []
      parameters: [{ name: token, in: query, required: true, schema: { type: string } }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SetupRequest" } } } }
      responses: { "200": { description: setup complete }, "401": { description: bad/used token } }

  /auth/login:
    post:
      tags: [auth]
      summary: Password login (Argon2id) → JWT
      security: []
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [username, password], properties: { username: { type: string }, password: { type: string } } } } } }
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TokenResponse" } } } }, "401": { description: bad credentials } }
  /auth/webauthn/authenticate:
    post:
      tags: [auth]
      summary: WebAuthn passkey assertion → JWT (begin/finish via the WebAuthn ceremony)
      security: []
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TokenResponse" } } } } }
  /auth/webauthn/register:
    post:
      tags: [auth]
      summary: Enrol a passkey for the current user
      security: [{ bearerAuth: [admin] }]
      responses: { "200": { description: enrolled } }

  /users:
    get:
      tags: [users]
      summary: List operators
      security: [{ bearerAuth: [admin] }]
      responses: { "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/User" } } } } } }
    post:
      tags: [users]
      summary: Add an operator
      security: [{ bearerAuth: [admin] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
      responses: { "200": { description: created } }
  /users/{name}/totp:
    parameters: [{ name: name, in: path, required: true, schema: { type: string } }]
    post:
      tags: [users]
      summary: Begin TOTP enrolment (on-air auth) — returns the otpauth URI + recovery codes on verify
      security: [{ bearerAuth: [admin] }]
      responses: { "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TotpEnrolment" } } } } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT bearer. The token carries scopes `read` (status/monitor/routes/sessions
        view), `operate` (connect/disconnect, port up/down, beacon, tune, ping) and
        `admin` (config write, users). Obtained via /auth/login (Argon2id) or a WebAuthn
        passkey. On-air auth (a station over a packet session) uses TOTP, not this token.

  parameters:
    PortId:
      name: id
      in: path
      required: true
      schema: { type: string }

  schemas:
    NodeStatus:
      type: object
      required: [callsign, version, uptimeSeconds, portsUp, portsTotal, sessionCount, netrom, traffic]
      properties:
        callsign: { type: string }
        alias: { type: string }
        grid: { type: string }
        version: { type: string }
        uptimeSeconds: { type: integer }
        portsUp: { type: integer }
        portsTotal: { type: integer }
        sessionCount: { type: integer }
        netrom:
          type: object
          properties:
            neighbours: { type: integer }
            destinations: { type: integer }
            inp3Enabled: { type: boolean }
        traffic:
          type: object
          description: The persisted traffic log's health (enabled this boot; frames dropped by the bounded writer — never the radio path's loss).
          properties:
            enabled: { type: boolean }
            dropped: { type: integer }

    PortStatus:
      type: object
      required: [id, enabled, state, sessionCount, framesIn, framesOut]
      properties:
        id: { type: string }
        enabled: { type: boolean }
        state: { type: string, enum: [up, down, faulted] }
        sessionCount: { type: integer }
        lastError: { type: [string, "null"] }
        framesIn: { type: integer }
        framesOut: { type: integer }

    TransportConfig:
      oneOf:
        - { $ref: "#/components/schemas/KissTcpTransport" }
        - { $ref: "#/components/schemas/SerialKissTransport" }
        - { $ref: "#/components/schemas/NinoTncTransport" }
        - { $ref: "#/components/schemas/AxudpTransport" }
        - { $ref: "#/components/schemas/TaitTransparentTransport" }
      discriminator: { propertyName: kind }
    KissTcpTransport:
      type: object
      required: [kind, host, port]
      properties: { kind: { const: kiss-tcp }, host: { type: string }, port: { type: integer } }
    SerialKissTransport:
      type: object
      required: [kind, device, baud]
      properties: { kind: { const: serial-kiss }, device: { type: string }, baud: { type: integer } }
    NinoTncTransport:
      type: object
      required: [kind, device, baud, mode]
      properties: { kind: { const: nino-tnc }, device: { type: string }, baud: { type: integer }, mode: { type: integer } }
    AxudpTransport:
      type: object
      required: [kind, host, port, localPort]
      properties: { kind: { const: axudp }, host: { type: string }, port: { type: integer }, localPort: { type: integer } }
    TaitTransparentTransport:
      type: object
      # A Tait TM8100/TM8200 radio in Transparent mode AS the modem (no external TNC): AX.25 over
      # the radio's FFSK byte pipe with KISS SLIP framing. Bind by exactly one of device / serial
      # (serial preferred — stable across /dev/ttyUSB* renumbering). No `radio:` block on this kind
      # (the radio is the modem; there is no separate CCDI control channel, hence no per-frame RSSI).
      required: [kind]
      properties:
        kind: { const: tait-transparent }
        device: { type: string, description: "radio serial device path (exactly one of device/serial)" }
        serial: { type: string, description: "radio CCDI serial number (exactly one of device/serial)" }
        baud: { type: integer, description: "CCDI command-mode baud (default 28800)" }
        transparentBaud: { type: integer, description: "Transparent-mode terminal baud (default 28800)" }
        ffskBaud: { type: integer, description: "FFSK over-air baud for airtime estimation (default 2400)" }
        leadInMs: { type: integer, description: "modelled TX lead-in ms — key-up + FFSK preamble (default 100)" }

    Ax25PortParams:
      type: object
      properties:
        t1Ms: { type: integer }
        t2Ms: { type: integer }
        t3Ms: { type: integer }
        n2: { type: integer }
        windowSize: { type: integer }
        maxCachedPeers: { type: integer }
    KissParams:
      type: object
      properties:
        txDelay: { type: integer }
        persistence: { type: integer, description: "0..255 byte" }
        slotTime: { type: integer }
        txTail: { type: integer }
    PortConfig:
      type: object
      required: [id, enabled, transport]
      properties:
        id: { type: string }
        enabled: { type: boolean }
        transport: { $ref: "#/components/schemas/TransportConfig" }
        profile: { type: [string, "null"] }
        ax25: { oneOf: [{ $ref: "#/components/schemas/Ax25PortParams" }, { type: "null" }] }
        kiss: { oneOf: [{ $ref: "#/components/schemas/KissParams" }, { type: "null" }] }

    Inp3Config:
      type: object
      properties:
        enabled: { type: boolean }
        preferInp3Routes: { type: boolean }
        l3RttInterval: { type: integer }
        l3RttResetWindow: { type: integer }
        rifInterval: { type: integer }
        positiveDebounce: { type: integer }
    NetRomConfig:
      type: object
      properties:
        enabled: { type: boolean }
        broadcast: { type: boolean }
        # The node's routing role — the single 3-state successor to the old
        # connect + forward bools (None = passive listen-only; Endpoint = open
        # interlinks for our own connect <alias> but no transit; Transit = full
        # router: interlinks + relay third-party transit).
        routing: { type: string, enum: [None, Endpoint, Transit] }
        # Legacy back-compat inputs (deprecated — prefer `routing`). Still accepted
        # so existing configs keep parsing + behaving identically; ignored (with a
        # config-load warning) when `routing` is also set. Nullable: absent = unset.
        connect: { type: [boolean, "null"], deprecated: true }
        forward: { type: [boolean, "null"], deprecated: true }
        forwardMode: { type: string, enum: [PerFlow, Single] }
        alias: { type: [string, "null"] }
        defaultNeighbourQuality: { type: integer }
        minQuality: { type: integer }
        obsoleteInitial: { type: integer }
        obsoleteMinimum: { type: integer }
        sweepIntervalSeconds: { type: integer }
        window: { type: integer }
        transportTimeoutSeconds: { type: integer }
        transportRetries: { type: integer }
        timeToLive: { type: integer }
        inp3: { $ref: "#/components/schemas/Inp3Config" }
    NodeConfig:
      type: object
      required: [schemaVersion, identity, ports]
      properties:
        schemaVersion: { type: integer }
        identity:
          type: object
          required: [callsign]
          properties: { callsign: { type: string }, alias: { type: [string, "null"] }, grid: { type: [string, "null"] } }
        ports: { type: array, items: { $ref: "#/components/schemas/PortConfig" } }
        services:
          type: object
          properties: { banner: { type: string }, prompt: { type: string } }
        management:
          type: object
          properties:
            telnet: { type: object, properties: { enabled: { type: boolean }, bind: { type: string }, port: { type: integer } } }
            http: { type: object, properties: { bind: { type: string }, port: { type: integer } } }
        netRom: { $ref: "#/components/schemas/NetRomConfig" }

    Inp3RouteMetric:
      type: object
      required: [targetTimeMs, hopCount]
      properties: { targetTimeMs: { type: integer }, hopCount: { type: integer } }
    NetRomRoute:
      type: object
      required: [neighbour, quality, obsolescence]
      properties:
        neighbour: { type: string }
        quality: { type: integer, minimum: 0, maximum: 255 }
        obsolescence: { type: integer }
        inp3: { oneOf: [{ $ref: "#/components/schemas/Inp3RouteMetric" }, { type: "null" }] }
    NetRomDestination:
      type: object
      required: [destination, alias, bestRoute, routes]
      properties:
        destination: { type: string }
        alias: { type: string }
        bestRoute: { type: integer }
        routes: { type: array, items: { $ref: "#/components/schemas/NetRomRoute" } }
    NetRomNeighbour:
      type: object
      required: [neighbour, alias, portId, pathQuality, lastHeard]
      properties:
        neighbour: { type: string }
        alias: { type: string }
        portId: { type: string }
        pathQuality: { type: integer, minimum: 0, maximum: 255 }
        lastHeard: { type: string }
    NetRomRoutingSnapshot:
      type: object
      required: [generatedAt, neighbours, destinations]
      properties:
        generatedAt: { type: string, format: date-time }
        neighbours: { type: array, items: { $ref: "#/components/schemas/NetRomNeighbour" } }
        destinations: { type: array, items: { $ref: "#/components/schemas/NetRomDestination" } }

    SessionInfo:
      type: object
      required: [id, portId, peer, role, state, vs, vr, window, uptimeSeconds, bytesIn, bytesOut, lastActivity]
      properties:
        id: { type: string }
        portId: { type: string }
        peer: { type: string }
        role: { type: string, enum: [console, interlink, bridge] }
        state: { type: string, description: "Connected, TimerRecovery, …" }
        vs: { type: integer }
        vr: { type: integer }
        window: { type: integer }
        uptimeSeconds: { type: integer }
        bytesIn: { type: integer }
        bytesOut: { type: integer }
        lastActivity: { type: string }

    LinkStats:
      type: object
      required: [portId, peer, smoothedRttMs, retries, rejCount, srejCount, framesIn, framesOut]
      properties:
        portId: { type: string }
        peer: { type: string }
        smoothedRttMs: { type: integer }
        retries: { type: integer }
        rejCount: { type: integer }
        srejCount: { type: integer }
        framesIn: { type: integer }
        framesOut: { type: integer }

    MonitorEvent:
      type: object
      description: One decoded AX.25 frame (from the Ax25Listener.FrameTraced tap). Delivered over the SSE `frame` event.
      required: [seq, timestamp, portId, direction, source, dest, type, classKind, length, summary]
      properties:
        seq: { type: integer }
        timestamp: { type: string, format: date-time }
        portId: { type: string }
        direction: { type: string, enum: [in, out] }
        source: { type: string }
        dest: { type: string }
        type: { type: string, enum: [UI, SABM, SABME, I, RR, RNR, REJ, SREJ, FRMR, UA, DISC, DM, XID] }
        classKind: { type: string, enum: [I, U, S] }
        pid: { type: [string, "null"] }
        pidName: { type: [string, "null"] }
        ns: { type: [integer, "null"] }
        nr: { type: [integer, "null"] }
        pf: { type: integer }
        command: { type: boolean }
        length: { type: integer }
        summary: { type: string }
        raw: { type: array, items: { type: integer }, description: "octets for the hex dump" }
        path: { type: array, items: { type: string }, description: "digipeater path" }
        control: { type: integer, description: "first control octet (additive; persisted by the traffic log)" }
        infoLength: { type: integer, description: "info-field length in bytes (additive)" }
        rssiDbm: { type: [number, "null"], description: "per-frame RSSI in dBm (received frames on a radio-attached port); null otherwise" }
        snrDb: { type: [number, "null"], description: "RSSI over the tracked noise floor, in dB; null when unavailable" }
        noiseFloorDbm: { type: [number, "null"], description: "tracked channel-idle noise floor, in dBm; null when unavailable" }

    TrafficFrame:
      type: object
      description: One persisted frame from the traffic log (`traffic.db`). `raw` is capped at 2048 octets per frame; `infoLength` is always the true decoded length.
      required: [id, timestamp, portId, direction, source, dest, kind, pf, control, infoLength, raw]
      properties:
        id: { type: integer, description: "monotonic row id (insertion order)" }
        timestamp: { type: string, format: date-time }
        portId: { type: string }
        direction: { type: string, enum: [rx, tx] }
        source: { type: string }
        dest: { type: string }
        kind: { type: string, enum: [UI, SABM, SABME, I, RR, RNR, REJ, SREJ, FRMR, UA, DISC, DM, XID, TEST] }
        ns: { type: [integer, "null"] }
        nr: { type: [integer, "null"] }
        pf: { type: integer }
        control: { type: integer, description: "first control octet" }
        pid: { type: [integer, "null"], description: "protocol id byte (I/UI frames)" }
        infoLength: { type: integer }
        raw: { type: array, items: { type: integer }, description: "raw frame octets, capped at 2048" }
        rssiDbm: { type: [number, "null"], description: "per-frame RSSI in dBm (received frames on a radio-attached port); null otherwise" }
        snrDb: { type: [number, "null"], description: "RSSI over the tracked noise floor, in dB" }
        noiseFloorDbm: { type: [number, "null"], description: "tracked channel-idle noise floor, in dBm" }

    HeardStation:
      type: object
      description: One recently-heard station (MHeard). firstHeard/lastHeard are relative-ago strings; ports is the count of distinct ports for the node-wide view (else 1).
      required: [callsign, firstHeard, lastHeard, count, ports]
      properties:
        callsign: { type: string }
        portId: { type: [string, "null"], description: "the port (per-port view), or null for the node-wide merged view" }
        firstHeard: { type: string, description: "relative-ago, e.g. 0:01:14" }
        lastHeard: { type: string }
        count: { type: integer }
        ports: { type: integer }
        lastRssiDbm: { type: [number, "null"], description: "RSSI (dBm) of the newest frame heard, when a radio measured it; else null" }
        lastSnrDb: { type: [number, "null"], description: "SNR (dB) of the newest frame heard, when a radio measured it; else null" }
        medianPreDataCarrierMs: { type: [number, "null"], description: "rolling median (last 32) of the station's measured carrier-rise→data lead (ms) — its effective TXDELAY as heard here + a small constant rig overhead; else null. See docs/research/txdelay-optimisation.md." }
        preDataCarrierSamples: { type: integer, description: "samples behind medianPreDataCarrierMs (0 when never measured)" }
        txDelayAdvisory: { type: [string, "null"], description: "passive excess-TXDELAY advisory when the median exceeds the threshold with enough samples; else null" }

    RadioStatus:
      type: object
      description: A port's radio-control attachment. attached=false = configured but not open (port down, or degraded after a failed open).
      required: [portId, attached, kind, connectionState]
      properties:
        portId: { type: string }
        attached: { type: boolean }
        kind: { type: string, description: "radio-control kind, e.g. tait-ccdi (empty for a port with no radio block)" }
        controlPort: { type: [string, "null"], description: "the serial device the control channel is on (the resolved /dev/ttyUSB* when attached)" }
        serial: { type: [string, "null"], description: "the radio's CCDI serial number (config or queried identity)" }
        identity: { oneOf: [{ $ref: "#/components/schemas/RadioIdentity" }, { type: "null" }] }
        connectionState: { type: string, enum: [healthy, faulted, unknown] }
        channelBusy: { type: [boolean, "null"], description: "last hardware carrier-sense (DCD): true=RF on channel, false=idle, null=unknown" }
        health: { oneOf: [{ $ref: "#/components/schemas/RadioHealth" }, { type: "null" }] }

    RadioIdentity:
      type: object
      required: [model, ccdiVersion]
      properties:
        model: { type: string, description: "friendly product name, e.g. Tait TM8110" }
        ccdiVersion: { type: string }

    RadioHealth:
      type: object
      description: Latest radio-health sample. The forward/reverse/ratio fields are per-station TRENDS from uncalibrated detectors — NOT VSWR; alert on change, never absolute value.
      properties:
        rssiDbm: { type: [number, "null"], description: "the radio's own most-recent sliding-average RSSI (dBm); null while transmitting" }
        averagedRssiDbm: { type: [number, "null"], description: "median RSSI over the health window (dBm)" }
        paTemperatureC: { type: [integer, "null"], description: "PA temperature in °C (null on radios that report only an ADC value)" }
        forwardTrendMillivolts: { type: [integer, "null"], description: "offset-corrected forward detector (mV), transmit samples only — a TREND" }
        reverseTrendMillivolts: { type: [integer, "null"], description: "offset-corrected reverse detector (mV), transmit samples only — a TREND" }
        reverseForwardRatio: { type: [number, "null"], description: "offset-corrected reverse/forward ratio — a TREND, NEVER VSWR" }
        sampleAt: { type: [string, "null"], format: date-time }

    RigStatus:
      type: object
      description: A port's rig-control (CAT) attachment. attached=false = configured but not connected (port down, or degraded after an unreachable daemon at bring-up).
      required: [portId, attached, kind, endpoint, capabilities, connectionState]
      properties:
        portId: { type: string }
        attached: { type: boolean }
        kind: { type: string, enum: ["", hamlib, flrig], description: "rig-control kind (empty for a port with no rig block)" }
        endpoint: { type: string, description: "the daemon endpoint as host:port (config defaults resolved)" }
        backend: { type: [string, "null"], description: "what the backend calls itself, e.g. 'Hamlib rigctld', 'flrig'" }
        manufacturer: { type: [string, "null"] }
        model: { type: [string, "null"], description: "rig model as the backend reports it, e.g. 'Dummy', 'IC-7300'" }
        capabilities:
          type: array
          items: { type: string }
          description: "camel-cased Packet.Rig.RigCapabilities flag names the rig actually advertises (frequencyGet, modeSet, swrMeter, …) — render exactly this slice"
        connectionState: { type: string, enum: [healthy, faulted, unknown], description: "faulted self-heals: the backends re-dial on the next poll" }
        frequencyHz: { type: [integer, "null"], format: int64, description: "current-VFO frequency in Hz" }
        mode: { type: [string, "null"], description: "operating mode token (hamlib vocabulary or the rig's native name)" }
        passbandHz: { type: [integer, "null"], description: "receiver passband width in Hz where reported (hamlib yes, flrig no)" }
        transmitting: { type: [boolean, "null"], description: "last observed PTT state" }
        meters: { oneOf: [{ $ref: "#/components/schemas/RigMeters" }, { type: "null" }] }
        sampledAt: { type: [string, "null"], format: date-time, description: "when the last successful poll tick completed" }

    RigMeters:
      type: object
      description: Latest TX-side meter sample — meaningful while transmitting (idle rigs read ~0, so meters are only polled fast during PTT).
      required: [sampleAt]
      properties:
        swr: { type: [number, "null"], description: "SWR as a dimensionless ratio, 1.0 = perfect match" }
        rfPowerWatts: { type: [number, "null"], description: "RF power output in watts (calibrated backends)" }
        rfPowerRelative: { type: [number, "null"], description: "RF power output as a fraction of full scale (0–1)" }
        sampleAt: { type: string, format: date-time }

    RadioScanResult:
      type: object
      description: One radio found by a bus scan. serial (CCDI serial) is the primary stable key to bind a port by.
      required: [serial, model, ccdiVersion, baud, devicePath]
      properties:
        serial: { type: string, description: "CCDI serial number — the stable key (radio.serial:)" }
        model: { type: string }
        ccdiVersion: { type: string }
        baud: { type: integer }
        devicePath: { type: string, description: "current device, e.g. /dev/ttyUSB0 (may renumber between scans)" }
        byIdPath: { type: [string, "null"], description: "the /dev/serial/by-id/* symlink for this device, or null when absent/ambiguous/off-Linux" }

    PortDoctorReport:
      type: object
      description: The capability-doctor result for one port — a plain-language checklist an operator reads to answer "is this port's radio setup healthy?".
      required: [portId, probes, ranAt]
      properties:
        portId: { type: string }
        probes: { type: array, items: { $ref: "#/components/schemas/PortDoctorProbe" } }
        ranAt: { type: string, format: date-time, description: "when the run completed (UTC)" }

    PortDoctorProbe:
      type: object
      description: One capability probe's verdict.
      required: [name, status, detail]
      properties:
        name: { type: string, description: "short probe id, e.g. tnc-present, radio-present, sdm" }
        status: { type: string, enum: [pass, fail, unknown], description: "pass = working; fail = broken (see remedy); unknown = not determined (e.g. a transmitting probe skipped on the safe form, or not-a-NinoTNC)" }
        detail: { type: string, description: "what was observed, in operator-facing prose" }
        remedy: { type: [string, "null"], description: "one-line remedial action, or null when none applies" }

    HailRequest:
      type: object
      description: Request to hail a peer station over a port's SDM side channel.
      required: [peerSdmId]
      properties:
        peerSdmId: { type: string, description: "the peer radio's 8-character SDM data identity to hail" }

    PortHailStatus:
      type: object
      description: >
        A peer station's status as learned over the SDM side channel — returned even when the peer is
        unreachable on the packet path because of a mode mismatch (the mismatch is exactly what `mode`
        then reveals).
      required: [callsign, supportedModes, capabilities]
      properties:
        callsign: { type: string, description: "the peer's callsign" }
        mode: { type: [integer, "null"], description: "the peer's current NinoTNC mode number, or null when undetermined" }
        modeName: { type: [string, "null"], description: "human name of the mode, e.g. '1200 AFSK AX.25'" }
        bitRateHz: { type: [integer, "null"], description: "the peer's current over-air bit rate (bits/s), or null" }
        channel: { type: [string, "null"], description: "the peer's radio channel as its radio reports it, or null" }
        supportedModes: { type: array, items: { type: integer }, description: "NinoTNC mode numbers the peer advertises it can run" }
        capabilities: { type: array, items: { type: string }, description: "capability tokens the peer advertises (e.g. hail, modecoord, tune)" }
        rssiOfHailDbm: { type: [number, "null"], description: "the peer's receiver RSSI (dBm) sampled at hail receipt — the hail's link quality as heard at the far end — or null" }

    TuningStartRequest:
      type: object
      description: Request to arm a guided deviation-tuning session on a port.
      required: [role, peerSdmId]
      properties:
        role: { type: string, enum: [tuned, meter], description: "this port's role: tuned (transmits bursts; operator turns the pot here) or meter (measures a remote peer)" }
        peerSdmId: { type: string, description: "the peer radio's 8-character SDM data identity" }
        burstFrames: { type: integer, minimum: 1, maximum: 50, default: 5, description: "frames per measurement burst" }

    TxDelayMinStartRequest:
      type: object
      description: Request to arm a TXDELAY-minimisation sweep on a port.
      required: [role, peerSdmId]
      properties:
        role: { type: string, enum: [coordinator, meter], description: "coordinator sweeps its OWN TXDELAY down (transmits!); meter is passive decode counting for a remote coordinator" }
        peerSdmId: { type: string, description: "the peer radio's 8-character SDM data identity" }
        startMs: { type: [integer, "null"], description: "coordinator: the TXDELAY to sweep down from, in ms (default = the port's configured kiss.txDelay, else 500)" }
        stepMs: { type: integer, default: 40, description: "coordinator: the sweep decrement in ms" }
        minMs: { type: integer, default: 20, description: "coordinator: the sweep floor in ms" }
        probesPerStep: { type: integer, minimum: 1, maximum: 20, default: 5, description: "separately-keyed probes per step" }

    TxDelayApplyRequest:
      type: object
      description: Request to apply + verify a specific TXDELAY (typically a sweep's recommendation).
      required: [peerSdmId, txDelayMs]
      properties:
        peerSdmId: { type: string, description: "the peer radio's 8-character SDM data identity (its port must be running a txdelay-min meter session)" }
        txDelayMs: { type: integer, minimum: 1, maximum: 2550, description: "the TXDELAY to apply and verify, in ms" }
        probes: { type: integer, minimum: 1, maximum: 20, default: 5, description: "verify probes" }
        persist: { type: boolean, default: true, description: "persist a verified value into the port's kiss.txDelay config" }
        fallbackMs: { type: [integer, "null"], description: "the TXDELAY restored when the verify fails (default = the port's configured kiss.txDelay, else 500)" }

    TuningSessionInfo:
      type: object
      description: A tuning session's state (deviation or txdelay flavour).
      required: [sessionId, portId, role, peerSdmId, state, burstFrames, startedAt]
      properties:
        sessionId: { type: string }
        portId: { type: string }
        role: { type: string, enum: [tuned, meter, txdelay-coordinator, txdelay-meter, txdelay-apply] }
        peerSdmId: { type: string }
        state: { type: string, enum: [armed, peer-connected, awaiting-adjustment, ended, error, stopped] }
        burstFrames: { type: integer, description: "deviation: burst size; txdelay: probes per step" }
        startedAt: { type: string, format: date-time }

    TuningEvent:
      type: object
      description: One event on a tuning session's live feed — a per-round measurement (kind=round) or a lifecycle transition.
      required: [kind, at, state]
      properties:
        kind: { type: string, enum: [armed, peer-connected, round, awaiting-adjustment, ended, error] }
        at: { type: string, format: date-time }
        state: { type: string, enum: [armed, peer-connected, awaiting-adjustment, ended, error, stopped], description: "the session state after this event" }
        burstIndex: { type: [integer, "null"], description: "1-based round number (round events)" }
        decoded: { type: [integer, "null"], description: "frames the meter decoded this round (round events)" }
        total: { type: [integer, "null"], description: "frames requested this round (round events)" }
        levelDb: { type: [number, "null"], description: "RX-audio level in dB from the meter's GETRSSI fast path, or null (round events)" }
        rssiDbm: { type: [number, "null"], description: "median CCDI RSSI during the burst in dBm, or null (round events)" }
        advice: { type: [string, "null"], enum: [up, down, ok, sweep, null], description: "pot advice for the operator (round events)" }
        note: { type: [string, "null"], description: "one-line operator-facing note (round events)" }
        error: { type: [string, "null"], description: "failure detail (error events)" }
        txDelayMs: { type: [integer, "null"], description: "the commanded TXDELAY of a txdelay-min sweep step, in ms (round events of a txdelay session)" }
        preDataCarrierMs: { type: [number, "null"], description: "the meter's median measured carrier-rise→data lead for the step, in ms — the as-heard effective TXDELAY (round events of a txdelay session, with a carrier-sensing radio)" }
        recommendedTxDelayMs: { type: [integer, "null"], description: "the sweep's recommendation, in ms (the ended event of a completed txdelay sweep)" }

    LogLine:
      type: object
      properties:
        t: { type: string }
        lvl: { type: string, enum: [info, warn, error] }
        msg: { type: string }

    ApplyImpact:
      type: string
      enum: [live, port-restart, node-reset]
    ReconcileChange:
      type: object
      properties:
        path: { type: string }
        impact: { $ref: "#/components/schemas/ApplyImpact" }
        summary: { type: string }
    ReconcilePreview:
      type: object
      description: What applying a candidate config would disrupt (grouped by impact). Plain-language; never leaks internal type names.
      properties:
        valid: { type: boolean }
        live: { type: array, items: { $ref: "#/components/schemas/ReconcileChange" } }
        portRestart: { type: array, items: { $ref: "#/components/schemas/ReconcileChange" } }
        nodeReset: { type: array, items: { $ref: "#/components/schemas/ReconcileChange" } }
    ReconcileResult:
      allOf:
        - { $ref: "#/components/schemas/ReconcilePreview" }
        - type: object
          properties: { applied: { type: boolean } }
    ValidationProblem:
      type: object
      properties:
        errors: { type: array, items: { type: object, properties: { path: { type: string }, message: { type: string } } } }

    BeaconSettings:
      type: object
      properties:
        default: { type: object, properties: { intervalMinutes: { type: integer }, text: { type: string } } }
        ports:
          type: object
          additionalProperties:
            type: object
            properties: { enabled: { type: boolean }, intervalMinutes: { type: integer }, text: { type: [string, "null"] } }

    TuneBurstRequest:
      type: object
      required: [portId, partner, count]
      properties:
        portId: { type: string }
        partner: { type: string }
        count: { type: integer }
        txDelay: { type: integer }
        persistence: { type: integer }
        ackTimeoutMs: { type: integer }
    TuneBurstResult:
      type: object
      properties:
        delivered: { type: integer }
        lost: { type: integer }
        frames: { type: array, items: { type: object, properties: { seq: { type: integer }, acked: { type: boolean }, rttMs: { type: [integer, "null"] } } } }

    PingResult:
      type: object
      properties:
        replies: { type: array, items: { type: object, properties: { seq: { type: integer }, rttMs: { type: [integer, "null"] }, timeout: { type: boolean } } } }
        minMs: { type: integer }
        avgMs: { type: integer }
        maxMs: { type: integer }
        lossPct: { type: number }

    SetupRequest:
      type: object
      required: [identity, admin]
      properties:
        identity: { type: object, required: [callsign], properties: { callsign: { type: string }, alias: { type: string }, grid: { type: string } } }
        admin: { type: object, required: [username, password], properties: { username: { type: string }, password: { type: string }, enrolPasskey: { type: boolean } } }
        firstPort: { oneOf: [{ $ref: "#/components/schemas/PortConfig" }, { type: "null" }] }

    TokenResponse:
      type: object
      properties:
        token: { type: string }
        scopes: { type: array, items: { type: string } }
        user: { type: string }

    User:
      type: object
      required: [name, role, scopes]
      properties:
        name: { type: string }
        role: { type: string }
        scopes: { type: array, items: { type: string } }
        passkeys: { type: integer }
        lastLogin: { type: string }

    TotpEnrolment:
      type: object
      properties:
        otpauthUri: { type: string }
        secretBase32: { type: string }
        recoveryCodes: { type: array, items: { type: string } }
