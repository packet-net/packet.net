<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pdn — node control panel</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
          },
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
            popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
            success: { DEFAULT: 'hsl(var(--success))', foreground: 'hsl(var(--success-foreground))' },
            warning: { DEFAULT: 'hsl(var(--warning))', foreground: 'hsl(var(--warning-foreground))' },
            danger: { DEFAULT: 'hsl(var(--danger))', foreground: 'hsl(var(--danger-foreground))' },
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --radius: 0.5rem;
      --background: 0 0% 100%;
      --foreground: 222 24% 12%;
      --card: 0 0% 100%;
      --card-foreground: 222 24% 12%;
      --popover: 0 0% 100%;
      --popover-foreground: 222 24% 12%;
      --primary: 200 92% 44%;
      --primary-foreground: 0 0% 100%;
      --secondary: 220 14% 96%;
      --secondary-foreground: 222 20% 20%;
      --muted: 220 14% 96%;
      --muted-foreground: 220 9% 46%;
      --accent: 220 14% 94%;
      --accent-foreground: 222 24% 14%;
      --border: 220 13% 90%;
      --input: 220 13% 88%;
      --ring: 200 92% 44%;
      --success: 152 58% 40%;
      --success-foreground: 0 0% 100%;
      --warning: 33 92% 45%;
      --warning-foreground: 0 0% 100%;
      --danger: 0 72% 50%;
      --danger-foreground: 0 0% 100%;
    }
    .dark {
      --background: 220 26% 7%;
      --foreground: 210 22% 92%;
      --card: 220 23% 9.5%;
      --card-foreground: 210 22% 92%;
      --popover: 220 24% 8%;
      --popover-foreground: 210 22% 92%;
      --primary: 199 89% 52%;
      --primary-foreground: 220 40% 8%;
      --secondary: 220 18% 15%;
      --secondary-foreground: 210 20% 88%;
      --muted: 220 18% 14%;
      --muted-foreground: 218 12% 58%;
      --accent: 220 18% 16%;
      --accent-foreground: 210 22% 92%;
      --border: 220 16% 17%;
      --input: 220 16% 19%;
      --ring: 199 89% 52%;
      --success: 152 56% 46%;
      --success-foreground: 150 40% 6%;
      --warning: 38 92% 52%;
      --warning-foreground: 36 50% 8%;
      --danger: 0 74% 56%;
      --danger-foreground: 0 40% 8%;
    }
    * { border-color: hsl(var(--border)); }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: hsl(var(--muted-foreground) / 0.5); background-clip: padding-box; }
    .tnum { font-variant-numeric: tabular-nums; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }
    .live-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
    @keyframes row-in { from { background: hsl(var(--primary) / 0.10); } to { background: transparent; } }
    .row-flash { animation: row-in 1.1s ease-out; }
    [data-screen] { animation: fade-in .22s ease-out; }
    @keyframes fade-in { from { transform: translateY(6px); } to { transform: none; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="pdn/data.jsx"></script>
  <script type="text/babel" src="pdn/ui.jsx"></script>
  <script type="text/babel" src="pdn/screens-observe.jsx"></script>
  <script type="text/babel" src="pdn/screens-net.jsx"></script>
  <script type="text/babel" src="pdn/screens-manage.jsx"></script>
  <script type="text/babel" src="pdn/screens-tools.jsx"></script>
  <script type="text/babel" src="pdn/screens-auth.jsx"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      const { useState } = React;
      const [gate, setGate] = useState("login");
      const [route, setRoute] = useState("dashboard");
      const [connectTarget, setConnectTarget] = useState(null);
      const [tuneTarget, setTuneTarget] = useState(null);
      const go = (r) => setRoute(r);
      const connectTo = (call, portId) => { setConnectTarget({ call, portId }); setRoute("sessions"); };
      if (gate === "setup") return <Setup onDone={()=>setGate("login")} onSkip={()=>setGate("login")} />;
      if (gate === "login") return <Login onLogin={()=>setGate("app")} />;
      return (
        <React.Fragment>
        <Shell route={route} onNavigate={go} onLogout={()=>setGate("login")}>
          {route==="dashboard" && <Dashboard onNavigate={go} />}
          {route==="monitor" && <Monitor />}
          {route==="sessions" && <Sessions key={(connectTarget&&connectTarget.call)||'s'} initialConnect={connectTarget} />}
          {route==="routes" && <Routes onConnect={connectTo} />}
          {route==="ports" && <Ports onTune={(id)=>setTuneTarget(id)} />}
          {route==="config" && <ConfigEditor onNavigate={go} />}
          {route==="users" && <Users />}
        </Shell>
        {tuneTarget && <LinkTuner portId={tuneTarget} onClose={()=>setTuneTarget(null)} />}
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
